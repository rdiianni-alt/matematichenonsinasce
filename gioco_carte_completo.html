<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Maggiore, Minore o Uguale?</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#fdf8f2;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 10px}
.header{display:flex;flex-direction:column;align-items:center;margin-bottom:12px;text-decoration:none}
.logo img{width:60px;height:60px;object-fit:contain;border-radius:50%}
.blog-name{font-size:13px;color:#555;margin-top:5px;font-style:italic;text-align:center}
.blog-name span{color:#c0392b;font-weight:700}
h1{font-size:19px;color:#333;margin-bottom:2px;text-align:center}
.subtitle{font-size:12px;color:#aaa;margin-bottom:14px;text-align:center}
.score-bar{display:flex;gap:26px;justify-content:center;margin-bottom:14px}
.score-box{text-align:center}
.score-label{font-size:11px;color:#aaa}
.score-val{font-size:22px;font-weight:700;color:#333}
.game-area{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px}
.card{width:130px;height:182px;background:#fff;border-radius:12px;border:1.5px solid #ccc;box-shadow:2px 4px 12px rgba(0,0,0,0.13);display:block;flex-shrink:0}
.card svg{width:100%;height:100%}
.sym-box{width:64px;height:64px;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;border:2px dashed #ddd;border-radius:10px;background:#fafafa;color:#ccc;transition:all .2s;flex-shrink:0}
.sym-box.correct{border-color:#27ae60;background:#eafaf1;color:#27ae60}
.sym-box.wrong{border-color:#e74c3c;background:#fdedec;color:#e74c3c}
.feedback{text-align:center;font-size:15px;font-weight:600;min-height:22px;margin-bottom:6px;color:transparent}
.feedback.correct{color:#1e8449}
.feedback.wrong{color:#c0392b}
/* lettura in italiano */
.reading{text-align:center;font-size:14px;color:#555;min-height:38px;margin-bottom:10px;line-height:1.5;font-style:italic}
.reading strong{color:#1a1a1a;font-style:normal}
.btn-row{display:flex;gap:11px;justify-content:center;margin-bottom:12px}
.sym-btn{width:66px;height:66px;font-size:33px;font-weight:700;border-radius:12px;border:2px solid #bbb;background:#f8f8f8;color:#555;cursor:pointer;transition:all .15s}
.sym-btn:hover{background:#e8f4fd;border-color:#2980b9;color:#1a5276;transform:scale(1.08)}
.sym-btn.selected{border:3px solid #2980b9;background:#d6eaf8;color:#1a5276;transform:scale(1.12)}
.next-btn{display:block;margin:0 auto 8px;padding:10px 32px;font-size:15px;font-weight:600;border-radius:10px;border:none;background:#e8306a;color:#fff;cursor:pointer}
.next-btn:hover{background:#c0275a}
.hint{font-size:12px;color:#bbb;text-align:center;margin-top:4px}
</style>
</head>
<body>

<a class="header" href="https://matematicaconlemani.wordpress.com/" target="_blank">
  <div class="logo">
    <img src="https://raw.githubusercontent.com/rdiianni-alt/quiz-matematica-prima/fca31cdfe65286a5abbf269e23429e4ddc479c78/logo.png" alt="Logo"/>
  </div>
  <div class="blog-name">Matematiche <span>non</span> si nasce</div>
</a>

<h1>Maggiore, Minore o Uguale?</h1>
<p class="subtitle">Scegli il simbolo giusto tra le due carte!</p>

<div class="score-bar">
  <div class="score-box"><div class="score-label">Punteggio</div><div class="score-val" id="score">0/0</div></div>
  <div class="score-box" id="streak-box" style="display:none"><div class="score-label">Serie</div><div class="score-val" id="streak">🔥0</div></div>
</div>

<div class="game-area">
  <div class="card" id="card-left"></div>
  <div class="sym-box" id="sym-box">?</div>
  <div class="card" id="card-right"></div>
</div>

<div class="feedback" id="feedback"></div>
<div class="reading" id="reading"></div>

<div class="btn-row" id="btn-row">
  <button class="sym-btn" onclick="choose('lt')">&lt;</button>
  <button class="sym-btn" onclick="choose('eq')">=</button>
  <button class="sym-btn" onclick="choose('gt')">&gt;</button>
</div>

<button class="next-btn" id="next-btn" style="display:none" onclick="newRound()">Carta successiva ▶</button>
<p class="hint">Scegli &lt; &nbsp;=&nbsp; o &gt; tra le due carte</p>

<script>
/* Pip positions in a 130×182 card.
   Left col: cx=38, right col: cx=92, center: cx=65
   Rows well inside card: top zone 36-90, bottom mirrored */
const PIPS={
  1:[[65,91,false]],
  2:[[65,42,false],[65,140,true]],
  3:[[65,36,false],[65,91,false],[65,146,true]],
  4:[[38,42,false],[92,42,false],[38,140,true],[92,140,true]],
  5:[[38,36,false],[92,36,false],[65,91,false],[38,146,true],[92,146,true]],
  6:[[38,36,false],[92,36,false],[38,91,false],[92,91,false],[38,146,true],[92,146,true]],
  7:[[38,32,false],[92,32,false],[65,58,false],[38,84,false],[92,84,false],[38,146,true],[92,146,true]],
  8:[[38,32,false],[92,32,false],[65,56,false],[38,80,false],[92,80,false],[65,106,true],[38,150,true],[92,150,true]],
  9:[[38,30,false],[92,30,false],[38,58,false],[92,58,false],[65,91,false],[38,116,true],[92,116,true],[38,150,true],[92,150,true]],
  10:[[38,30,false],[92,30,false],[65,50,false],[38,70,false],[92,70,false],[38,112,true],[92,112,true],[65,132,true],[38,152,true],[92,152,true]]
};

const SUITS=['♠','♥','♦','♣'];
const RED={'♥':true,'♦':true};
const NOMI=['','uno','due','tre','quattro','cinque','sei','sette','otto','nove','dieci'];

function rnd(n){return Math.floor(Math.random()*n)}
function randomCard(){return{val:rnd(10)+1,suit:SUITS[rnd(4)]}}

function buildCard(card){
  const col=RED[card.suit]?'#c0392b':'#1a1a1a';
  const lbl=card.val===1?'A':card.val;
  const pips=(PIPS[card.val]||[]).map(([cx,cy,flip])=>{
    const r=flip?`rotate(180,${cx},${cy})`:'';
    return `<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" font-size="19" fill="${col}" transform="${r}">${card.suit}</text>`;
  }).join('');
  return `<svg viewBox="0 0 130 182" xmlns="http://www.w3.org/2000/svg">
    <rect width="130" height="182" rx="11" fill="white" stroke="#ccc" stroke-width="1.5"/>
    <text x="9" y="19" font-size="15" font-weight="bold" fill="${col}" font-family="sans-serif">${lbl}</text>
    <text x="9" y="34" font-size="13" fill="${col}" font-family="sans-serif">${card.suit}</text>
    <text x="121" y="163" font-size="15" font-weight="bold" fill="${col}" font-family="sans-serif" text-anchor="end" transform="rotate(180,121,163)">${lbl}</text>
    <text x="121" y="178" font-size="13" fill="${col}" font-family="sans-serif" text-anchor="end" transform="rotate(180,121,178)">${card.suit}</text>
    ${pips}
  </svg>`;
}

function buildReading(lv, rv, ans){
  const ln=NOMI[lv], rn=NOMI[rv];
  if(ans==='eq') return `<strong>${ln}</strong> è <strong>uguale a</strong> <strong>${rn}</strong>`;
  const rel1 = ans==='lt' ? 'minore di' : 'maggiore di';
  const rel2 = ans==='lt' ? 'maggiore di' : 'minore di';
  return `<strong>${ln}</strong> è <strong>${rel1}</strong> <strong>${rn}</strong><br><strong>${rn}</strong> è <strong>${rel2}</strong> <strong>${ln}</strong>`;
}

let left,right,answered=false,score=0,total=0,streak=0;

function newRound(){
  left=randomCard();right=randomCard();
  answered=false;
  document.getElementById('card-left').innerHTML=buildCard(left);
  document.getElementById('card-right').innerHTML=buildCard(right);
  const sb=document.getElementById('sym-box');
  sb.textContent='?';sb.className='sym-box';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('reading').innerHTML='';
  document.getElementById('btn-row').style.display='flex';
  document.getElementById('next-btn').style.display='none';
  document.querySelectorAll('.sym-btn').forEach(b=>b.classList.remove('selected'));
}

function getCorrect(l,r){return l<r?'lt':l>r?'gt':'eq'}

function choose(type){
  if(answered)return;
  answered=true;
  const L={lt:'<',eq:'=',gt:'>'};
  const ans=getCorrect(left.val,right.val);
  const ok=type===ans;
  total++;if(ok){score++;streak++;}else{streak=0;}
  document.getElementById('score').textContent=score+'/'+total;
  const sbox=document.getElementById('streak-box');
  if(streak>=2){sbox.style.display='';document.getElementById('streak').textContent='🔥'+streak;}
  else sbox.style.display='none';
  const sym=document.getElementById('sym-box');
  sym.textContent=L[type];sym.className='sym-box '+(ok?'correct':'wrong');
  const fb=document.getElementById('feedback');
  fb.className='feedback '+(ok?'correct':'wrong');
  fb.textContent=ok?(streak>=3?'🔥 '+streak+' di fila! Esatto!':'✅ Esatto!'):'❌ Riprova! '+NOMI[left.val]+' '+L[ans]+' '+NOMI[right.val];
  // lettura in italiano sempre con la risposta corretta
  document.getElementById('reading').innerHTML=buildReading(left.val,right.val,ans);
  document.querySelectorAll('.sym-btn').forEach(b=>{if(b.textContent.trim()===L[type])b.classList.add('selected');});
  document.getElementById('btn-row').style.display='none';
  document.getElementById('next-btn').style.display='block';
}

newRound();
</script>
</body>
</html>
