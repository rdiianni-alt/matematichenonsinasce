<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subitizing – Matematiche non si nasce</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 12px; width: 100%; overflow-x: hidden; }

  header, .controls, .card-wrap, .actions, .score, .back-link {
    width: 100%;
    max-width: 700px;
  }

  header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    background: #fff;
    border-radius: 16px;
    padding: 16px 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 16px;
    text-align: center;
    box-sizing: border-box;
  }

  .logo a {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: inherit;
  }

  .logo img {
    width: 60px;
    height: 60px;
    object-fit: contain;
    border-radius: 50%;
  }

  .logo .blog-name {
    font-size: 15px;
    font-weight: 600;
    color: #333;
    letter-spacing: 0.3px;
  }

  .subtitle {
    font-size: 13px;
    color: #777;
    margin-top: 2px;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    background: #fff;
    border-radius: 12px;
    padding: 12px 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    margin-bottom: 16px;
    box-sizing: border-box;
  }
  .controls label { font-size: 13px; color: #555; display: flex; align-items: center; gap: 6px; }
  .controls input[type=number] { width: 54px; border: 1.5px solid #ddd; border-radius: 6px; padding: 4px 6px; font-size: 14px; text-align: center; }
  .controls select { border: 1.5px solid #ddd; border-radius: 6px; padding: 4px 8px; font-size: 13px; }

  .card-wrap {
    background: #fff;
    border-radius: 20px;
    border: 2.5px solid #e0e0e0;
    overflow: hidden;
    margin-bottom: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.07);
    box-sizing: border-box;
  }
  canvas { display: block; width: 100%; height: auto; }

  .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 10px; }
  .btn { padding: 9px 20px; border-radius: 8px; border: 1.5px solid #ccc; background: #fff; cursor: pointer; font-size: 14px; font-weight: 500; color: #333; transition: background .15s; }
  .btn:hover { background: #f0f0f0; }
  .btn-new { border-color: #1e88e5; color: #1e88e5; }
  .btn-new:hover { background: #e3f2fd; }
  .btn-reveal { border-color: #fb8c00; color: #fb8c00; }
  .btn-reveal:hover { background: #fff3e0; }

  .answer-box { display: flex; align-items: center; gap: 8px; }
  .answer-box input[type=number] { width: 72px; font-size: 22px; text-align: center; border: 2px solid #bbb; border-radius: 8px; padding: 6px 4px; transition: border-color .2s; }
  .result { font-size: 18px; font-weight: 600; padding: 6px 16px; border-radius: 8px; display: none; }
  .result.correct { background: #e8f5e9; color: #2e7d32; }
  .result.wrong { background: #ffebee; color: #c62828; }
  .result.show-answer { background: #fff8e1; color: #e65100; }
  .timer { font-size: 13px; color: #999; min-width: 52px; }

  .score {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    font-size: 13px;
    color: #777;
    background: #fff;
    padding: 10px 16px;
    border-radius: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    box-sizing: border-box;
    margin-bottom: 16px;
  }
  .score span b { color: #333; font-size: 15px; }

  .back-link {
    text-align: center;
    margin-bottom: 8px;
  }
  .back-link a {
    display: inline-block;
    padding: 10px 24px;
    border-radius: 8px;
    border: 1.5px solid #999;
    background: #fff;
    color: #555;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: background .15s;
  }
  .back-link a:hover { background: #f0f0f0; }

  @media (max-width: 480px) {
    .actions { flex-direction: column; align-items: stretch; }
    .answer-box { justify-content: center; }
    .controls { flex-direction: column; align-items: stretch; }
    .controls label { justify-content: center; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <a href="https://matematicaconlemani.wordpress.com/" target="_blank">
      <img src="https://raw.githubusercontent.com/rdiianni-alt/quiz-matematica-prima/main/logo.png" alt="Logo Matematiche non si nasce">
      <span class="blog-name">Matematiche non si nasce</span>
    </a>
  </div>
  <p class="subtitle">Osserva la carta e scrivi quanti pallini vedi!</p>
</header>

<div class="controls">
  <label>Da <input type="number" id="minVal" value="1" min="1" max="49"> a <input type="number" id="maxVal" value="10" min="2" max="50"> pallini</label>
  <label>Colore:
    <select id="colorSel">
      <option value="mixed">Misto</option>
      <option value="#e53935">Rosso</option>
      <option value="#1e88e5">Blu</option>
      <option value="#43a047">Verde</option>
      <option value="#fb8c00">Arancione</option>
      <option value="#8e24aa">Viola</option>
    </select>
  </label>
</div>

<div class="card-wrap">
  <canvas id="dotCanvas"></canvas>
</div>

<div class="actions">
  <button class="btn btn-new" onclick="newCard()">🔄 Nuova carta</button>
  <div class="answer-box">
    <input type="number" id="userAnswer" min="0" max="50" placeholder="?" onkeydown="if(event.key==='Enter') checkAnswer()">
    <button class="btn" onclick="checkAnswer()" style="border-color:#43a047;color:#2e7d32;">✓ Conferma</button>
    <div class="result" id="resultBox"></div>
  </div>
  <button class="btn btn-reveal" onclick="reveal()">👁 Mostra risposta</button>
  <span class="timer" id="timerSpan"></span>
</div>

<div class="score">
  <span>✅ Corrette: <b id="sc">0</b></span>
  <span>❌ Sbagliate: <b id="sw">0</b></span>
  <span>📊 Totale: <b id="st">0</b></span>
</div>

<script>
const COLORS = ["#e53935","#1e88e5","#43a047","#fb8c00","#8e24aa","#00acc1","#f4511e","#d81b60"];
let currentCount = 0, answered = false, timerInterval, elapsed = 0;
let sc = 0, sw = 0, st = 0;

function randColor() {
  const s = document.getElementById('colorSel').value;
  return s === 'mixed' ? COLORS[Math.floor(Math.random()*COLORS.length)] : s;
}

function newCard() {
  answered = false;
  document.getElementById('userAnswer').value = '';
  document.getElementById('userAnswer').style.borderColor = '#bbb';
  const rb = document.getElementById('resultBox');
  rb.style.display = 'none';
  clearInterval(timerInterval);
  elapsed = 0;
  document.getElementById('timerSpan').textContent = '';

  const mn = Math.max(1, parseInt(document.getElementById('minVal').value)||1);
  const mx = Math.min(50, parseInt(document.getElementById('maxVal').value)||10);
  currentCount = Math.floor(Math.random()*(mx-mn+1))+mn;

  const canvas = document.getElementById('dotCanvas');
  const W = 700, H = 490;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,W,H);

  const r = Math.max(10, Math.min(48, Math.floor(Math.sqrt((W*H*0.3)/(currentCount*Math.PI)))));
  const placed = [];
  let tries = 0;
  while (placed.length < currentCount && tries < 8000) {
    tries++;
    const x = r+8 + Math.random()*(W-2*(r+8));
    const y = r+8 + Math.random()*(H-2*(r+8));
    let ok = true;
    for (const p of placed) {
      const dx=p.x-x, dy=p.y-y;
      if (Math.sqrt(dx*dx+dy*dy) < r*2+6) { ok=false; break; }
    }
    if (ok) placed.push({x,y,c:randColor()});
  }

  for (const p of placed) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.fillStyle = p.c;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(p.x-r*0.25, p.y-r*0.25, r*0.3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fill();
  }

  timerInterval = setInterval(()=>{
    elapsed = parseFloat((elapsed+0.1).toFixed(1));
    document.getElementById('timerSpan').textContent = elapsed.toFixed(1)+'s';
  },100);
}

function checkAnswer() {
  if (answered) return;
  const val = parseInt(document.getElementById('userAnswer').value);
  if (isNaN(val)) return;
  answered = true;
  clearInterval(timerInterval);
  st++; document.getElementById('st').textContent = st;
  const rb = document.getElementById('resultBox');
  if (val === currentCount) {
    rb.textContent = '✓ Risposta esatta!';
    rb.className = 'result correct';
    document.getElementById('userAnswer').style.borderColor = '#43a047';
    sc++; document.getElementById('sc').textContent = sc;
  } else {
    rb.textContent = '✗ Erano '+currentCount;
    rb.className = 'result wrong';
    document.getElementById('userAnswer').style.borderColor = '#e53935';
    sw++; document.getElementById('sw').textContent = sw;
  }
  rb.style.display = 'block';
}

function reveal() {
  if (answered) return;
  clearInterval(timerInterval);
  answered = true;
  const rb = document.getElementById('resultBox');
  rb.textContent = '👀 Sono '+currentCount+'!';
  rb.className = 'result show-answer';
  rb.style.display = 'block';
}

window.onload = () => newCard();
</script>
</body>
</html>
