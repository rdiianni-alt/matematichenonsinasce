<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Somme Parlate</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f4ff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  /* LOGO E BLOG */
  .header {
    text-align: center;
    margin-bottom: 18px;
  }
  .header a {
    text-decoration: none;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .header img {
    width: 60px; height: 60px;
    object-fit: contain;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    transition: transform 0.2s;
  }
  .header img:hover { transform: scale(1.08); }
  .header .blog-nome {
    font-size: 0.95rem;
    font-weight: 600;
    color: #3a3a8c;
    letter-spacing: 0.3px;
  }

  h1 { font-size: 1.6rem; color: #3a3a8c; margin-bottom: 4px; text-align: center; }
  .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 16px; text-align: center; }

  /* SELEZIONE LIVELLO */
  .livelli {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }
  .btn-livello {
    padding: 10px 22px;
    border-radius: 30px;
    border: 2px solid #3a3a8c;
    background: white;
    color: #3a3a8c;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-livello.attivo {
    background: #3a3a8c;
    color: white;
  }
  .btn-livello:hover { background: #3a3a8c; color: white; }

  .card {
    background: white; border-radius: 20px; padding: 30px 24px 24px;
    max-width: 420px; width: 100%;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center;
  }
  .domanda {
    font-size: 1.35rem; font-weight: bold; color: #222;
    line-height: 2.2; margin-bottom: 24px; min-height: 100px;
    display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 6px;
  }
  .domanda span { color: #3a3a8c; }
  .input-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; }
  input[type=number] {
    width: 130px; font-size: 2rem; text-align: center;
    border: 3px solid #c0c8f0; border-radius: 12px; padding: 10px;
    outline: none; color: #3a3a8c; transition: border-color 0.2s;
  }
  input[type=number]:focus { border-color: #3a3a8c; }
  .btn {
    background: #3a3a8c; color: white; border: none;
    border-radius: 12px; padding: 12px 32px; font-size: 1rem;
    cursor: pointer; margin: 6px; transition: background 0.2s;
  }
  .btn:hover { background: #2a2a6c; }
  .btn-secondary { background: #e0e4ff; color: #3a3a8c; }
  .btn-secondary:hover { background: #c8cef5; }
  .feedback { font-size: 1.3rem; font-weight: bold; margin: 14px 0 6px; min-height: 36px; }
  .corretto { color: #27ae60; }
  .sbagliato { color: #e74c3c; }
  .spiegazione { font-size: 0.95rem; color: #555; margin-bottom: 10px; min-height: 24px; }
  .punteggio { margin-top: 16px; font-size: 0.95rem; color: #888; }
  .stelle { font-size: 1.4rem; }
  .badge-livello {
    display: inline-block;
    margin-bottom: 12px;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .badge-facile { background: #fff3e0; color: #e65100; }
  .badge-difficile { background: #e8eaf6; color: #3a3a8c; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>

<!-- HEADER CON LOGO E NOME BLOG -->
<div class="header">
      <a href="https://matematichenonsinasce.com/">
    <img src="https://raw.githubusercontent.com/rdiianni-alt/quiz-matematica-prima/fca31cdfe65286a5abbf269e23429e4ddc479c78/logo.png" alt="logo">
    <span class="blog-nome">Matematiche non si nasce</span>
  </a>
</div>

<h1>🔢 Somme Parlate</h1>
<p class="subtitle">Leggi, ragiona e trova il numero nascosto!</p>

<!-- SELEZIONE LIVELLO -->
<div class="livelli">
  <button class="btn-livello attivo" id="btn1" onclick="setLivello(1)">⭐ Livello 1<br><small>Unità e Decine</small></button>
  <button class="btn-livello" id="btn2" onclick="setLivello(2)">⭐⭐ Livello 2<br><small>+ Centinaia</small></button>
</div>

<div class="card">
  <div class="badge-livello badge-facile" id="badge">LIVELLO 1 — Unità e Decine</div>
  <div class="domanda" id="domanda">Caricamento...</div>
  <div class="input-row">
    <input type="number" id="risposta" placeholder="?" min="0" max="9999">
  </div>
  <div>
    <button class="btn" onclick="verifica()">✅ Controlla</button>
    <button class="btn btn-secondary" onclick="nuovaDomanda()">⏭ Salta</button>
  </div>
  <div class="feedback" id="feedback"></div>
  <div class="spiegazione" id="spiegazione"></div>
  <div class="punteggio">
    Punteggio: <span id="punti">0</span> &nbsp;|&nbsp; Domande: <span id="totale">0</span>
    <div class="stelle" id="stelle"></div>
  </div>
</div>

<script>
const domandeL1 = [

  { t:["1 DECINA","19 UNITÀ"], r:29, s:"10 + 19 = 29" },
  { t:["5 DECINE","12 UNITÀ"], r:62, s:"50 + 12 = 62" },

const domandeL2 = [
  { t:["5 CENTINAIA","34 UNITÀ","2 DECINE"], r:554, s:"500 + 34 + 20 = 554" },
  { t:["25 UNITÀ","2 DECINE","5 CENTINAIA"], r:545, s:"25 + 20 + 500 = 545" },
  { t:["21 UNITÀ","4 DECINE","3 CENTINAIA"], r:361, s:"21 + 40 + 300 = 361" },
  { t:["2 DECINE","14 UNITÀ","7 CENTINAIA"], r:734, s:"20 + 14 + 700 = 734" },
  { t:["17 DECINE","27 UNITÀ","3 CENTINAIA"], r:497, s:"170 + 27 + 300 = 497" },
  { t:["71 UNITÀ","2 CENTINAIA","2 DECINE"], r:291, s:"71 + 200 + 20 = 291" },
  { t:["4 CENTINAIA","2 DECINE","17 UNITÀ"], r:437, s:"400 + 20 + 17 = 437" },

  { t:["2 CENTINAIA","24 UNITÀ","3 DECINE"], r:254, s:"200 + 24 + 30 = 254" },

  { t:["54 UNITÀ","2 CENTINAIA","21 DECINE"], r:464, s:"54 + 200 + 210 = 464" },
  { t:["134 UNITÀ","2 DECINE","5 CENTINAIA"], r:654, s:"134 + 20 + 500 = 654" },
  { t:["8 CENTINAIA","23 UNITÀ","9 DECINE"], r:913, s:"800 + 23 + 90 = 913" },

  { t:["9 CENTINAIA","54 UNITÀ"], r:954, s:"900 + 54 = 954" },
  { t:["2 CENTINAIA","62 UNITÀ","8 DECINE"], r:342, s:"200 + 62 + 80 = 342" },
  { t:["12 DECINE","81 UNITÀ"], r:201, s:"120 + 81 = 201" },

  { t:["2 DECINE","8 CENTINAIA"], r:820, s:"20 + 800 = 820" },
  { t:["9 CENTINAIA","3 UNITÀ"], r:903, s:"900 + 3 = 903" },
  { t:["6 UNITÀ","14 DECINE","3 CENTINAIA"], r:446, s:"6 + 140 + 300 = 446" },
  { t:["81 UNITÀ","2 DECINE","3 CENTINAIA"], r:401, s:"81 + 20 + 300 = 401" },
  { t:["3 CENTINAIA","12 UNITÀ","5 DECINE"], r:362, s:"300 + 12 + 50 = 362" },
  { t:["3 CENTINAIA","23 UNITÀ"], r:323, s:"300 + 23 = 323" },
  { t:["5 CENTINAIA","123 UNITÀ"], r:623, s:"500 + 123 = 623" },
  { t:["7 CENTINAIA","2 UNITÀ"], r:702, s:"700 + 2 = 702" },
  { t:["18 DECINE","3 CENTINAIA","12 UNITÀ"], r:492, s:"180 + 300 + 12 = 492" },
  { t:["3 DECINE","23 UNITÀ","8 CENTINAIA"], r:853, s:"30 + 23 + 800 = 853" },
  { t:["123 UNITÀ","4 CENTINAIA"], r:523, s:"123 + 400 = 523" },
  { t:["4 CENTINAIA","16 DECINE"], r:560, s:"400 + 160 = 560" },
  { t:["8 UNITÀ","29 DECINE"], r:298, s:"8 + 290 = 298" },
];

let livello = 1;
let usate = [], punti = 0, totale = 0, corrente = null;

function deduplica(arr) {
  const s = new Set();
  return arr.filter(d => {
    const k = d.r+'|'+[...d.t].sort().join('|');
    if (s.has(k)) return false; s.add(k); return true;
  });
}
const pool = { 1: deduplica(domandeL1), 2: deduplica(domandeL2) };

function setLivello(n) {
  livello = n;
  usate = []; punti = 0; totale = 0;
  document.getElementById('punti').textContent = '0';
  document.getElementById('totale').textContent = '0';
  document.getElementById('stelle').textContent = '';
  document.getElementById('btn1').classList.toggle('attivo', n===1);
  document.getElementById('btn2').classList.toggle('attivo', n===2);
  const badge = document.getElementById('badge');
  if (n===1) {
    badge.textContent = 'LIVELLO 1 — Unità e Decine';
    badge.className = 'badge-livello badge-facile';
  } else {
    badge.textContent = 'LIVELLO 2 — Unità, Decine e Centinaia';
    badge.className = 'badge-livello badge-difficile';
  }
  nuovaDomanda();
}

function shuffle(arr) {
  return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(v=>v[1]);
}

function nuovaDomanda() {
  const p = pool[livello];
  if (usate.length >= p.length) usate = [];
  const disp = p.filter((_,i) => !usate.includes(i));
  const idx = p.indexOf(disp[Math.floor(Math.random()*disp.length)]);
  usate.push(idx);
  corrente = p[idx];
  document.getElementById('domanda').innerHTML =
    shuffle([...corrente.t]).map(t=>`<span>${t}</span>`).join(' &nbsp;+&nbsp; ');
  document.getElementById('risposta').value = '';
  document.getElementById('feedback').textContent = '';
  document.getElementById('spiegazione').textContent = '';
  document.getElementById('risposta').focus();
}

function verifica() {
  const val = parseInt(document.getElementById('risposta').value);
  if (isNaN(val)) return;
  totale++;
  document.getElementById('totale').textContent = totale;
  if (val === corrente.r) {
    punti++;
    document.getElementById('feedback').textContent = '🎉 Esatto!';
    document.getElementById('feedback').className = 'feedback corretto';
    document.getElementById('spiegazione').textContent = corrente.s;
    document.getElementById('punti').textContent = punti;
    const p = punti/totale;
    document.getElementById('stelle').textContent = p>=0.9?'⭐⭐⭐':p>=0.7?'⭐⭐':'⭐';
    setTimeout(nuovaDomanda, 1500);
  } else {
    document.getElementById('feedback').textContent = '❌ Riprova!';
    document.getElementById('feedback').className = 'feedback sbagliato';
    document.getElementById('risposta').value = '';
    document.getElementById('risposta').focus();
  }
}

document.getElementById('risposta').addEventListener('keydown', e => {
  if (e.key === 'Enter') verifica();
});

nuovaDomanda();
</script>

</html>
