function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function prepareQuestions() {
  const shuffledQ = shuffle(baseQuestions);
  return shuffledQ.map((q) => {
    const idx = q.options.map((_, i) => i);
    const shuffledIdx = shuffle(idx);
    const options = shuffledIdx.map((i) => q.options[i]);
    const answer = shuffledIdx.indexOf(q.answer);
    return Object.assign({}, q, { options: options, answer: answer });
  });
}

        svg += '<text x="' + x + '" y="65" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f2937">' + v + '</text>';
      }
      if (v === 25) svg += '<ellipse cx="' + x + '" cy="35" rx="13" ry="11" fill="#111827"/>';
    });

  },
  buttons: function () {
    let html = '<div class="buttons-grid">';
    for (let i = 0; i < 12; i++) html += '<div class="button-circle"><div class="button-dot"></div></div>';

  clocks: function () {

      '<div><p class="clock-label">Partenza</p><div class="clock-display">14:10</div></div>' +

  },
  arrows: function () {
    const diagrams = [
      { title: 'Immagine A', nums: [{n:18,x:25,y:75},{n:6,x:95,y:75},{n:2,x:155,y:25}], arrows: [[2,1],[1,0]] },

      { title: 'Immagine C', nums: [{n:2,x:30,y:25},{n:8,x:155,y:25},{n:4,x:95,y:75}], arrows: [[0,2],[2,1]] }

    let html = '<div class="arrows-row">';
    diagrams.forEach(function (d, idx) {
      let svg = '<svg viewBox="0 0 180 100" class="arrow-svg"><defs><marker id="arrowhead-' + idx + '" markerWidth="8" markerHeight="8" refX="4" refY="2" orient="auto"><path d="M0,0 L0,4 L4,2 z" fill="#1f2937"/></marker></defs>';
      d.arrows.forEach(function (pair) {
        const a = d.nums[pair[0]], b = d.nums[pair[1]];
        svg += '<line x1="' + a.x + '" y1="' + a.y + '" x2="' + b.x + '" y2="' + b.y + '" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead-' + idx + ')"/>';
      });
      d.nums.forEach(function (p) {
        svg += '<text x="' + p.x + '" y="' + p.y + '" font-size="20" font-weight="bold" text-anchor="middle" dy="-6" fill="#111827">' + p.n + '</text>';

  stones: function () {
    const stones = [
      {x:10,y:10,r:14,c:'#a8a29e'},{x:30,y:18,r:11,c:'#78716c'},{x:50,y:8,r:16,c:'#d6d3d1'},
      {x:72,y:15,r:12,c:'#57534e'},{x:95,y:10,r:13,c:'#a8a29e'},{x:118,y:18,r:10,c:'#d6d3d1'},
      {x:18,y:38,r:13,c:'#78716c'},{x:42,y:35,r:15,c:'#a8a29e'},{x:65,y:40,r:11,c:'#57534e'},
      {x:88,y:35,r:14,c:'#d6d3d1'},{x:110,y:42,r:12,c:'#78716c'},{x:8,y:62,r:12,c:'#d6d3d1'},
      {x:32,y:60,r:14,c:'#57534e'},{x:55,y:65,r:11,c:'#a8a29e'},{x:78,y:60,r:13,c:'#78716c'},
      {x:100,y:65,r:15,c:'#d6d3d1'},{x:122,y:60,r:10,c:'#a8a29e'},{x:15,y:85,r:11,c:'#57534e'},
      {x:38,y:88,r:13,c:'#d6d3d1'},{x:60,y:85,r:12,c:'#78716c'},{x:82,y:88,r:14,c:'#a8a29e'},
      {x:105,y:85,r:11,c:'#57534e'},{x:5,y:105,r:10,c:'#78716c'},{x:28,y:108,r:12,c:'#a8a29e'},
      {x:50,y:105,r:14,c:'#d6d3d1'},{x:72,y:108,r:11,c:'#57534e'},{x:95,y:105,r:13,c:'#78716c'},
      {x:118,y:110,r:10,c:'#a8a29e'}
    ];
    let svg = '<svg viewBox="0 0 135 125" class="stones-svg">';
    stones.forEach(function (s) {
      svg += '<ellipse cx="' + s.x + '" cy="' + s.y + '" rx="' + s.r + '" ry="' + (s.r * 0.8) + '" fill="' + s.c + '" stroke="#44403c" stroke-width="0.5"/>';
    });
    svg += '</svg>';
    return svg;
  },
  money: function () {
    let html = '<div class="money-box"><p class="money-label">I soldi di Niccolò:</p><div class="money-row">';
    for (let i = 0; i < 4; i++) html += '<div class="coin-2e">2€</div>';
    html += '</div><div class="money-row">';
    for (let i = 0; i < 4; i++) html += '<div class="coin-1e">1€</div>';
    html += '</div><div class="banknote">5 EURO</div></div>';
    return html;
  },
  battery: function () {
    return '<svg viewBox="0 0 100 50" class="battery-svg">' +
      '<rect x="2" y="5" width="85" height="40" rx="4" fill="none" stroke="#1f2937" stroke-width="3"/>' +
      '<rect x="87" y="18" width="8" height="14" fill="#1f2937"/>' +
      '<rect x="10" y="12" width="14" height="26" fill="#1f2937"/>' +
      '<rect x="28" y="12" width="14" height="26" fill="#1f2937"/>' +
      '<rect x="46" y="12" width="14" height="26" fill="#1f2937"/>' +
      '<rect x="64" y="12" width="14" height="26" fill="#1f2937"/>' +
      '</svg>';
  },
  shapes: function () {
    return '<div class="shapes-row">' +
      '<div class="shape-box"><svg viewBox="0 0 100 100" class="shape-svg"><polygon points="50,5 90,27 90,73 50,95 10,73 10,27" fill="none" stroke="#1f2937" stroke-width="2.5"/></svg><p class="shape-label">Figura A</p></div>' +
      '<div class="shape-box"><svg viewBox="0 0 100 100" class="shape-svg"><polygon points="10,10 70,10 70,50 40,50 40,90 10,90" fill="none" stroke="#1f2937" stroke-width="2.5"/></svg><p class="shape-label">Figura B</p></div>' +
      '<div class="shape-box"><svg viewBox="0 0 100 100" class="shape-svg"><polygon points="50,5 85,20 95,55 75,90 40,95 10,65 15,30" fill="none" stroke="#1f2937" stroke-width="2.5"/></svg><p class="shape-label">Figura C</p></div>' +
      '</div>';
  },
  columnAddition: function () {
    return '<div class="col-add">' +
      '<div class="ca-row"><div class="ca-cell">4</div><div class="ca-cell">6</div><div class="ca-cell">+</div></div>' +
      '<div class="ca-row"><div class="ca-cell">2</div><div class="ca-box">?</div><div class="ca-cell">=</div></div>' +
      '<div class="ca-row ca-result"><div class="ca-box">?</div><div class="ca-cell">3</div><div class="ca-cell"></div></div>' +
      '</div>';
  },
  prices: function () {
    function row(items, price) {
      return '<div class="price-row"><div class="price-items">' + items + '</div><div class="price-tag">' + price + '</div></div>';
    }
    return '<div class="prices-box">' +
      row('<span class="price-item">📓</span><span class="price-item">📓</span>', '8 euro') +
      row('<span class="price-item">📓</span><span class="price-item">🖊️</span>', '6 euro') +
      row('<span class="price-item">🖊️</span><span class="price-item">📏</span>', '5 euro') +
      '</div>';
  },
  booksTable: function () {
    const books = ['Il mago di Oz', "Riccioli d'oro", "L'anello magico", 'Hansel e Gretel'];
    const data = {
      Enrico: ['😊','😊','😊',''],
      Axel: ['','','😐','😊'],
      Beatrice: ['','😊','😐',''],
      Gemma: ['','','😞',''],
      Anna: ['','😊','',''],
      Thomas: ['😊','😐','😞','']
    };
    let html = '<div class="books-table-wrap"><table class="books-table"><thead><tr><th></th>';
    books.forEach(function (b) { html += '<th>' + b + '</th>'; });
    html += '</tr></thead><tbody>';
    Object.keys(data).forEach(function (name) {
      html += '<tr><td class="name-cell">' + name + '</td>';
      data[name].forEach(function (v) { html += '<td class="emoji-cell">' + v + '</td>'; });
      html += '</tr>';
    });
    html += '</tbody></table><p class="books-legend">😊 mi è piaciuto molto · 😐 mi è piaciuto poco · 😞 non mi è piaciuto</p></div>';
    return html;
  },
  squaresSequence: function () {
    const figures = [
      { label: 'Figura 1', count: 3 },
      { label: 'Figura 2', count: 5 },
      { label: 'Figura 3', count: '?' },
      { label: 'Figura 4', count: 9 }
    ];
    let html = '<div class="squares-row">';
    figures.forEach(function (f) {
      html += '<div class="squares-fig"><div class="squares-box">';
      if (typeof f.count === 'number') {
        for (let j = 0; j < f.count; j++) html += '<div class="square-cell"></div>';
      } else {
        html += '<div class="square-question">?</div>';
      }
      html += '</div><p class="squares-label">' + f.label + '</p><p class="squares-count">' + (typeof f.count === 'number' ? f.count + ' quadretti' : '') + '</p></div>';
    });
    html += '</div>';
    return html;
  },
  pencils: function () {
    return '<div class="pencils-box">' +
      '<div class="pencil-row"><div class="pencil grey"></div><p class="pencil-label">matita grigia (lunghezza da scoprire)</p></div>' +
      '<div class="pencil-row"><div class="pencil black"></div><p class="pencil-label">matita nera = 11 centimetri</p></div>' +
      '<p class="pencil-note">la matita grigia è 2 centimetri più corta di quella nera</p>' +
      '</div>';
  }
};

/* ---------- App state & rendering ---------- */
let questions = prepareQuestions();
let current = 0;
let selected = null;
let score = 0;
let finished = false;

function render() {
  const root = document.getElementById('quiz-root');

  if (finished) {
    const pct = Math.round((score / questions.length) * 100);
    let msg = 'Continua ad allenarti, ce la farai!';
    if (pct >= 80) msg = 'Ottimo lavoro! 🎉';
    else if (pct >= 50) msg = 'Bel lavoro, continua così! 👍';

    root.innerHTML =
      '<div class="card finished-card">' +
        '<h2 class="finished-title">Quiz completato!</h2>' +
        '<p class="finished-score">Hai risposto correttamente a <b>' + score + '</b> domande su <b>' + questions.length + '</b></p>' +
        '<p class="finished-pct">' + pct + '%</p>' +
        '<p class="finished-msg">' + msg + '</p>' +
        '<button class="restart-btn" id="restart-btn">Ricomincia</button>' +
      '</div>';

    document.getElementById('restart-btn').onclick = restart;
    return;
  }

  const q = questions[current];
  let optionsHtml = '';
  q.options.forEach(function (opt, i) {
    let cls = 'option-btn';
    if (selected !== null) {
      if (i === q.answer) cls += ' correct';
      else if (i === selected) cls += ' wrong';
      else cls += ' dim';
    }
    optionsHtml += '<button class="' + cls + '" data-idx="' + i + '"' + (selected !== null ? ' disabled' : '') + '><b>' + String.fromCharCode(65 + i) + '.</b> ' + opt + '</button>';
  });

  let feedbackHtml = '';
  if (selected !== null) {
    if (selected === q.answer) {
      feedbackHtml += '<p class="feedback-correct">✓ Corretto!</p>';
    } else {
      feedbackHtml += '<p class="feedback-wrong">✗ Risposta sbagliata. La risposta corretta è la ' + String.fromCharCode(65 + q.answer) + '.</p>';
    }
    feedbackHtml += '<button class="next-btn" id="next-btn">' + (current + 1 < questions.length ? 'Prossima domanda →' : 'Vedi risultati') + '</button>';
  }

  root.innerHTML =
    '<div class="card">' +
      '<div class="progress-row"><span>Domanda ' + (current + 1) + ' di ' + questions.length + '</span><span>Punteggio: ' + score + '</span></div>' +
      '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + ((current / questions.length) * 100) + '%"></div></div>' +
      '<h2 class="question-text">' + q.text + '</h2>' +
      (q.visual ? visuals[q.visual]() : '') +
      '<div class="options">' + optionsHtml + '</div>' +
      feedbackHtml +
    '</div>';

  if (selected === null) {
    document.querySelectorAll('.option-btn').forEach(function (btn) {
      btn.onclick = function () { selectOption(parseInt(btn.dataset.idx, 10)); };
    });
  } else {
    document.getElementById('next-btn').onclick = next;
  }
}

function selectOption(i) {
  if (selected !== null) return;
  selected = i;
  if (i === questions[current].answer) score++;
  render();
}

function next() {
  if (current + 1 < questions.length) {
    current++;
    selected = null;
  } else {
    finished = true;
  }
  render();
}

function restart() {
  questions = prepareQuestions();
  current = 0;
  selected = null;
  score = 0;
  finished = false;
  render();
}

render();
</script>
