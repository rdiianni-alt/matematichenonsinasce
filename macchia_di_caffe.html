<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Macchia di Caffè</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', serif;
    background: #fdf6e3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  /* ── RESPONSIVE MOBILE ── */
  @media (max-width: 480px) {
    body { padding: 10px; }
    h1 { font-size: 1.2rem; }
    .subtitle { font-size: 0.75rem; }
    .logo img { width: 44px; height: 44px; }
    .logo-text { font-size: 11px; }

    .setup { padding: 14px 14px; }
    .setup h2 { font-size: 0.9rem; }
    .btn-opt { font-size: 0.75rem; padding: 5px 10px; }
    .btn-start { font-size: 0.95rem; padding: 10px; }

    .scheda { padding: 14px 10px 14px; }
    .scheda-header { font-size: 0.65rem; }
    .scheda-logo-mini { font-size: 0.6rem; }

    /* Caselle cifre più piccole */
    .digit-cell { width: 36px; height: 46px; font-size: 1.5rem; border-radius: 3px; }
    .digit-cell.dot-cell { width: 12px; font-size: 1.4rem; }
    .stain-wrap { width: 36px; height: 46px; }
    .stain-svg { width: 52px; height: 56px; }

    /* Segni operazione orizzontale */
    .op-sign-inline { font-size: 1.5rem; margin: 0 2px; }

    /* Layout verticale */
    .op-vert-label { font-size: 1.4rem; width: 28px; }

    /* Input risposta */
    .answer-input { font-size: 1.4rem; width: 80px; }
    .btn-check { font-size: 0.85rem; padding: 8px 18px; }
    .feedback { font-size: 0.95rem; }
    .btn-next { font-size: 0.85rem; padding: 7px 18px; }
    .score-row { font-size: 0.8rem; gap: 16px; }
    .answer-label { font-size: 0.8rem; }
  }

  .logo { display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; }
  .logo a { display: block; }
  .logo img { width: 60px; height: 60px; object-fit: contain; border-radius: 50%; }
  .logo-text { font-size: 13px; font-style: italic; color: #5d3a1a; margin-top: 4px; letter-spacing: 1px; }
  .logo-text span { color: #5d3a1a; }

  h1 { font-size: 1.6rem; color: #5d3a1a; margin-bottom: 4px; letter-spacing: 2px; }
  .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 16px; }

  .setup {
    background: white; border-radius: 16px; padding: 20px 28px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.1); width: 100%; max-width: 520px; margin-bottom: 20px;
  }
  .setup h2 { font-size: 1rem; color: #5d3a1a; margin-bottom: 14px; }
  .setup-row { margin-bottom: 14px; }
  .setup-row label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 6px; font-weight: bold; }
  .btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .btn-opt {
    padding: 7px 14px; border: 2px solid #c8a97e; border-radius: 20px;
    background: white; color: #5d3a1a; font-size: 0.85rem; cursor: pointer;
    transition: all 0.2s; font-family: Georgia, serif;
  }
  .btn-opt.active { background: #c8a97e; color: white; border-color: #a07850; }
  .btn-opt:hover { background: #f0e0c8; }
  .btn-start {
    width: 100%; padding: 12px; background: #5d3a1a; color: white;
    border: none; border-radius: 12px; font-size: 1.1rem; font-family: Georgia, serif;
    cursor: pointer; margin-top: 8px; letter-spacing: 1px; transition: background 0.2s;
  }
  .btn-start:hover { background: #7a4f2a; }

  .game-area { width: 100%; max-width: 560px; display: none; flex-direction: column; align-items: center; gap: 16px; }

  .scheda {
    background: white; border-radius: 12px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.13);
    padding: 24px 20px 20px; width: 100%;
    border: 2px solid #e8d5b0;
  }
  .scheda-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 18px; font-size: 0.75rem; color: #aaa;
  }
  .scheda-logo-mini { font-size: 0.7rem; font-style: italic; color: #bbb; }
  .scheda-logo-mini span { color: #e8a0a0; }

  /* ── LAYOUT ORIZZONTALE (entro 20 e 100) ── */
  .op-inline {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    flex-wrap: nowrap;
    padding: 8px 0;
  }
  .op-sign-inline {
    font-size: 2rem; font-weight: bold; color: #444;
    margin: 0 4px; flex-shrink: 0;
  }

  /* ── LAYOUT VERTICALE (entro 1000, 10000, decimali) ── */
  .op-vertical {
    display: flex;
    flex-direction: column;
    align-items: flex-end;   /* allinea a destra */
    gap: 4px;
    padding: 8px 0;
  }
  .op-vert-row {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .op-vert-label {
    font-size: 1.8rem; font-weight: bold; color: #444;
    width: 34px; text-align: center; flex-shrink: 0;
  }
  /* Linea sotto il secondo addendo */
  .op-vert-line {
    height: 3px; background: #444; border-radius: 2px;
    /* larghezza calcolata via JS */
  }

  /* Caselle cifre */
  .num-box { display: flex; gap: 2px; align-items: center; }
  .digit-cell {
    width: 48px; height: 60px;
    border: 2.5px solid #444;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; font-weight: bold; color: #222;
    border-radius: 4px; background: white; flex-shrink: 0;
  }
  .digit-cell.dot-cell { border: none; width: 14px; font-size: 1.8rem; }

  /* Macchia */
  .stain-wrap {
    position: relative; width: 48px; height: 60px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .stain-wrap .digit-cell { position: absolute; z-index: 1; }
  .stain-svg {
    position: absolute; z-index: 2;
    width: 68px; height: 72px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .answer-row {
    margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .answer-label { font-size: 0.9rem; color: #666; }
  .answer-input {
    width: 100px; text-align: center; font-size: 1.8rem;
    border: 2px solid #c8a97e; border-radius: 8px; padding: 6px;
    font-family: Georgia, serif; color: #5d3a1a; outline: none;
  }
  .answer-input:focus { border-color: #a07850; }
  .btn-check {
    padding: 10px 28px; background: #c8a97e; color: white; border: none;
    border-radius: 10px; font-size: 1rem; font-family: Georgia, serif;
    cursor: pointer; transition: background 0.2s; letter-spacing: 1px;
  }
  .btn-check:hover { background: #a07850; }
  .feedback { font-size: 1.1rem; font-weight: bold; min-height: 28px; text-align: center; }
  .feedback.correct { color: #27ae60; }
  .feedback.wrong { color: #c0392b; }

  .score-row { display: flex; gap: 24px; font-size: 0.9rem; color: #666; }
  .score-row span { font-weight: bold; color: #5d3a1a; }

  .btn-next {
    padding: 9px 24px; background: #5d3a1a; color: white; border: none;
    border-radius: 10px; font-size: 0.95rem; font-family: Georgia, serif;
    cursor: pointer; display: none; transition: background 0.2s;
  }
  .btn-next:hover { background: #7a4f2a; }
  .btn-reset { font-size: 0.8rem; color: #aaa; background: none; border: none; cursor: pointer; text-decoration: underline; margin-top: 4px; }

  /* ── STAMPA SCHEDA PDF ── */
  .btn-print {
    width: 100%; padding: 12px; background: white; color: #5d3a1a;
    border: 2px solid #5d3a1a; border-radius: 12px; font-size: 1.05rem; font-family: Georgia, serif;
    cursor: pointer; margin-top: 10px; letter-spacing: 1px; transition: background 0.2s;
  }
  .btn-print:hover { background: #f0e0c8; }

  .print-sheet { display: none; }

  .ps-title {
    text-align: center; font-size: 1.8rem; color: #5d3a1a;
    letter-spacing: 1px; margin-bottom: 22px;
  }
  .ps-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 22px 12px;
    margin-bottom: 30px;
  }
  .ps-grid.ps-grid-vert { grid-template-columns: repeat(2, 1fr); }
  .ps-cell {
    border: 1px solid #ddd; border-radius: 8px;
    padding: 10px 6px 14px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .ps-num { align-self: flex-start; font-weight: bold; color: #5d3a1a; font-size: 0.85rem; }
  .ps-op-inline { display: flex; align-items: center; justify-content: center; gap: 4px; }
  .ps-sign { font-size: 1.6rem; font-weight: bold; color: #444; margin: 0 4px; }
  .ps-footer {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    border-top: 1px solid #e8d5b0; padding-top: 14px;
  }
  .ps-footer img { width: 44px; height: 44px; object-fit: contain; border-radius: 50%; }
  .ps-footer .logo-text { font-size: 12px; font-style: italic; color: #5d3a1a; letter-spacing: 1px; }
  .ps-footer .logo-text span { color: #5d3a1a; }

  /* Formato verticale (1000, 10000, decimali): tutto più compatto per stare in una pagina */
  .ps-grid-vert { gap: 12px 8px; }
  .ps-grid-vert .ps-cell { padding: 6px 4px 8px; gap: 3px; }
  .ps-grid-vert .op-vertical { gap: 2px; padding: 4px 0; }
  .ps-grid-vert .op-vert-row { gap: 3px; }
  .ps-grid-vert .op-vert-label { font-size: 1.15rem; width: 22px; }
  .ps-grid-vert .op-vert-line { height: 2px; }
  .ps-grid-vert .digit-cell {
    width: 32px; height: 40px; font-size: 1.3rem; border-width: 2px; border-radius: 3px;
  }
  .ps-grid-vert .digit-cell.dot-cell { width: 9px; font-size: 1.1rem; }
  .ps-grid-vert .stain-wrap { width: 32px; height: 40px; }
  .ps-grid-vert .stain-svg { width: 46px; height: 48px; }

  @media print {
    @page { margin: 14mm; }
    body * { visibility: hidden; }
    #printSheet, #printSheet * { visibility: visible; }
    #printSheet { display: block !important; position: absolute; top: 0; left: 0; width: 100%; }
  }
</style>
</head>
<body>

<div class="logo">
  <a href="https://matematichenonsinasce.com/">
    <img src="https://raw.githubusercontent.com/rdiianni-alt/quiz-matematica-prima/fca31cdfe65286a5abbf269e23429e4ddc479c78/logo.png" alt="Matematiche non si nasce">
  </a>
  <div class="logo-text">Matematiche <span>non</span> si nasce</div>
</div>

<h1>☕ La Macchia di Caffè</h1>
<p class="subtitle">Trova la cifra nascosta!</p>

<div class="setup" id="setup">
  <h2>⚙️ Impostazioni del gioco</h2>
  <div class="setup-row">
    <label>Livello</label>
    <div class="btn-group" id="levelGroup">
      <button class="btn-opt active" data-val="20">Entro 20</button>
      <button class="btn-opt" data-val="100">Entro 100</button>
      <button class="btn-opt" data-val="1000">Entro 1.000</button>
      <button class="btn-opt" data-val="10000">Entro 10.000</button>
      <button class="btn-opt" data-val="dec">Decimali</button>
    </div>
  </div>
  <div class="setup-row">
    <label>Operazione</label>
    <div class="btn-group" id="opGroup">
      <button class="btn-opt active" data-val="+">➕ Addizione</button>
      <button class="btn-opt" data-val="-">➖ Sottrazione</button>
      <button class="btn-opt" data-val="both">Entrambe</button>
    </div>
  </div>
  <button class="btn-start" onclick="startGame()">▶ Inizia il gioco</button>
  <button class="btn-print" onclick="printWorksheet()">🖨️ Stampa scheda esercizi (PDF)</button>
</div>

<div class="print-sheet" id="printSheet"></div>

<div class="game-area" id="gameArea">
  <div class="score-row">
    <div>✅ Corrette: <span id="scoreOk">0</span></div>
    <div>❌ Errori: <span id="scoreErr">0</span></div>
  </div>
  <div class="scheda" id="scheda">
    <div class="scheda-header">
      <div>Trova la cifra nascosta dalla macchia!</div>
      <div class="scheda-logo-mini">Matematiche <span>non</span> si nasce</div>
    </div>
    <div id="opContainer"></div>
    <div class="answer-row">
      <div class="answer-label">Quale cifra si nasconde sotto la macchia?</div>
      <input class="answer-input" type="number" id="answerInput" min="0" max="9" placeholder="0–9"
        onkeydown="if(event.key==='Enter') checkAnswer()">
      <button class="btn-check" onclick="checkAnswer()">Controlla ✓</button>
      <div class="feedback" id="feedback"></div>
      <button class="btn-next" id="btnNext" onclick="nextRound()">Prossima ➜</button>
    </div>
  </div>
  <button class="btn-reset" onclick="resetGame()">← Cambia impostazioni</button>
</div>

<script>
let level = '20', op = '+';
let correctDigit = 0;
let scoreOk = 0, scoreErr = 0;
let answered = false;

function setupGroup(id, setter) {
  document.querySelectorAll(`#${id} .btn-opt`).forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll(`#${id} .btn-opt`).forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      setter(b.dataset.val);
    });
  });
}
setupGroup('levelGroup', v => level = v);
setupGroup('opGroup', v => op = v);

function startGame() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('gameArea').style.display = 'flex';
  scoreOk = 0; scoreErr = 0;
  updateScore();
  nextRound();
}
function resetGame() {
  document.getElementById('setup').style.display = 'block';
  document.getElementById('gameArea').style.display = 'none';
}

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function chooseOp() {
  if (op === 'both') return Math.random() < 0.5 ? '+' : '-';
  return op;
}

function generateProblem() {
  const operation = chooseOp();
  let a, b, result;
  if (level === 'dec') {
    // Genero numeri con parte intera di 2 cifre e sempre 2 decimali
    a = +(rand(10, 99) + rand(1, 99) / 100).toFixed(2);
    b = +(rand(10, 99) + rand(1, 99) / 100).toFixed(2);
    if (operation === '-' && b > a) [a, b] = [b, a];
    result = +(operation === '+' ? a + b : a - b).toFixed(2);
  } else if (level === '20') {
    a = rand(10, 20); b = rand(10, 20);
    if (operation === '-') { if (b > a) [a, b] = [b, a]; result = a - b; }
    else result = a + b;
  } else if (level === '100') {
    let t = 0;
    do { a = rand(10, 99); b = rand(10, 99);
      if (operation === '-' && b > a) [a, b] = [b, a];
      result = operation === '+' ? a + b : a - b; t++;
    } while ((result < 10 || result > 99) && t < 200);
  } else if (level === '1000') {
    let t = 0;
    do { a = rand(100, 999); b = rand(100, 999);
      if (operation === '-' && b > a) [a, b] = [b, a];
      result = operation === '+' ? a + b : a - b; t++;
    } while ((result < 100 || result > 999) && t < 200);
  } else {
    let t = 0;
    do { a = rand(1000, 9999); b = rand(1000, 9999);
      if (operation === '-' && b > a) [a, b] = [b, a];
      result = operation === '+' ? a + b : a - b; t++;
    } while ((result < 1000 || result > 9999) && t < 200);
  }
  return { a, b, result, operation };
}

/* Converte un numero decimale in token con padding posizionale
   Struttura fissa: [U][U] [,] [D] [C]
   Se la parte intera ha 3 cifre, aggiunge una colonna in più a sinistra.
   Tutti i numeri vengono normalizzati alla stessa struttura. */
function numToTokens(n, isDecimal) {
  if (!isDecimal) {
    return [...String(n)].map(c =>
      c === ',' || c === '.' ? { type: 'dot', val: ',' } : { type: 'digit', val: c }
    );
  }
  // Per i decimali: forza sempre 2 decimali e normalizza la struttura
  const s = (+n).toFixed(2); // es. "23.45"
  const [intPart, decPart] = s.split('.');
  // intPart e decPart sono sempre stringhe
  const tokens = [];
  for (const c of intPart) tokens.push({ type: 'digit', val: c });
  tokens.push({ type: 'dot', val: ',' });
  for (const c of decPart) tokens.push({ type: 'digit', val: c });
  return tokens;
}

/* Nel layout verticale decimale, tutti i numeri devono avere
   la stessa struttura posizionale. Questa funzione normalizza
   una lista di token-array in modo che abbiano tutti lo stesso numero
   di cifre intere (padding con spazio a sinistra) */
function normalizeDecimalTokens(tokA, tokB, tokR) {
  // Trova il numero di cifre intere massimo
  const intLen = arr => arr.findIndex(t => t.type === 'dot');
  const maxInt = Math.max(intLen(tokA), intLen(tokB), intLen(tokR));
  function pad(tokens) {
    const il = intLen(tokens);
    const needed = maxInt - il;
    const padding = Array.from({length: needed}, () => ({ type: 'spacer', val: '' }));
    return [...padding, ...tokens];
  }
  return [pad(tokA), pad(tokB), pad(tokR)];
}

function buildNumBox(tokens, hidIdx) {
  const box = document.createElement('div');
  box.className = 'num-box';
  tokens.forEach((t, i) => {
    if (t.type === 'spacer') {
      // Casella vuota per allineamento posizionale
      const sp = document.createElement('div');
      sp.className = 'digit-cell';
      sp.style.border = 'none';
      sp.style.background = 'transparent';
      box.appendChild(sp);
    } else if (t.type === 'dot') {
      const d = document.createElement('div');
      d.className = 'digit-cell dot-cell';
      d.textContent = ',';
      box.appendChild(d);
    } else if (hidIdx !== null && i === hidIdx) {
      const wrap = document.createElement('div');
      wrap.className = 'stain-wrap';
      const cell = document.createElement('div');
      cell.className = 'digit-cell';
      cell.textContent = t.val;
      wrap.appendChild(cell);
      wrap.innerHTML += stainSVG();
      box.appendChild(wrap);
    } else {
      const cell = document.createElement('div');
      cell.className = 'digit-cell';
      cell.textContent = t.val;
      box.appendChild(cell);
    }
  });
  return box;
}

/* Larghezza in px di un num-box */
function boxWidth(tokens) {
  let w = 0;
  tokens.forEach(t => { w += t.type === 'dot' ? 14 : 48; });
  w += Math.max(0, tokens.length - 1) * 2; // gap
  return w;
}

/* Larghezza in px di un num-box nella scheda stampata (celle più piccole) */
function boxWidthPrint(tokens) {
  let w = 0;
  tokens.forEach(t => { w += t.type === 'dot' ? 9 : 32; });
  w += Math.max(0, tokens.length - 1) * 2; // gap
  return w;
}

function nextRound() {
  answered = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('answerInput').value = '';
  document.getElementById('btnNext').style.display = 'none';
  document.getElementById('answerInput').disabled = false;

  const { a, b, result, operation } = generateProblem();
  const isDecimal = (level === 'dec');
  let tokA = numToTokens(a, isDecimal);
  let tokB = numToTokens(b, isDecimal);
  let tokR = numToTokens(result, isDecimal);

  // Per i decimali, normalizza i token per allineamento sulla virgola
  if (isDecimal) {
    [tokA, tokB, tokR] = normalizeDecimalTokens(tokA, tokB, tokR);
  }

  const positions = [];
  tokA.forEach((t, i) => { if (t.type === 'digit') positions.push({ num: 'a', idx: i }); });
  tokB.forEach((t, i) => { if (t.type === 'digit') positions.push({ num: 'b', idx: i }); });
  tokR.forEach((t, i) => { if (t.type === 'digit') positions.push({ num: 'r', idx: i }); });

  const chosen = positions[rand(0, positions.length - 1)];
  if (chosen.num === 'a') correctDigit = parseInt(tokA[chosen.idx].val);
  else if (chosen.num === 'b') correctDigit = parseInt(tokB[chosen.idx].val);
  else correctDigit = parseInt(tokR[chosen.idx].val);

  const container = document.getElementById('opContainer');
  container.innerHTML = '';

  const useVertical = (level === '1000' || level === '10000' || level === 'dec');

  if (!useVertical) {
    /* ── LAYOUT ORIZZONTALE ── */
    const row = document.createElement('div');
    row.className = 'op-inline';

    row.appendChild(buildNumBox(tokA, chosen.num === 'a' ? chosen.idx : null));

    const opSign = document.createElement('div');
    opSign.className = 'op-sign-inline';
    opSign.textContent = operation;
    row.appendChild(opSign);

    row.appendChild(buildNumBox(tokB, chosen.num === 'b' ? chosen.idx : null));

    const eq = document.createElement('div');
    eq.className = 'op-sign-inline';
    eq.textContent = '=';
    row.appendChild(eq);

    row.appendChild(buildNumBox(tokR, chosen.num === 'r' ? chosen.idx : null));

    container.appendChild(row);

  } else {
    /* ── LAYOUT VERTICALE ── */
    const wrap = document.createElement('div');
    wrap.className = 'op-vertical';

    // Calcola la larghezza del num-box più largo (per la linea)
    const wA = boxWidth(tokA);
    const wB = boxWidth(tokB);
    const wR = boxWidth(tokR);
    const LABEL_W = 34 + 4; // larghezza etichetta + gap
    const lineW = Math.max(wA, wB, wR) + LABEL_W;

    // Riga A (etichetta vuota)
    const rowA = document.createElement('div');
    rowA.className = 'op-vert-row';
    const lblA = document.createElement('div');
    lblA.className = 'op-vert-label';
    lblA.textContent = '';
    rowA.appendChild(lblA);
    rowA.appendChild(buildNumBox(tokA, chosen.num === 'a' ? chosen.idx : null));
    wrap.appendChild(rowA);

    // Riga B (con operatore)
    const rowB = document.createElement('div');
    rowB.className = 'op-vert-row';
    const lblB = document.createElement('div');
    lblB.className = 'op-vert-label';
    lblB.textContent = operation;
    rowB.appendChild(lblB);
    rowB.appendChild(buildNumBox(tokB, chosen.num === 'b' ? chosen.idx : null));
    wrap.appendChild(rowB);

    // Linea separatrice — larga quanto tutto (operatore + num-box più largo)
    const line = document.createElement('div');
    line.className = 'op-vert-line';
    line.style.width = lineW + 'px';
    wrap.appendChild(line);

    // Riga risultato (etichetta vuota)
    const rowR = document.createElement('div');
    rowR.className = 'op-vert-row';
    const lblR = document.createElement('div');
    lblR.className = 'op-vert-label';
    lblR.textContent = '';
    rowR.appendChild(lblR);
    rowR.appendChild(buildNumBox(tokR, chosen.num === 'r' ? chosen.idx : null));
    wrap.appendChild(rowR);

    container.appendChild(wrap);
  }

  document.getElementById('answerInput').focus();
}

function stainSVG() {
  const h = rand(20, 35), s = rand(40, 60), l = rand(48, 62);
  return `<svg class="stain-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="50" cy="52" rx="42" ry="38" fill="hsl(${h},${s}%,${l}%)" opacity="0.92"/>
    <ellipse cx="44" cy="46" rx="28" ry="22" fill="hsl(${h},${s+5}%,${l-8}%)" opacity="0.55"/>
    <ellipse cx="58" cy="60" rx="18" ry="14" fill="hsl(${h},${s}%,${l+10}%)" opacity="0.3"/>
    <ellipse cx="36" cy="64" rx="14" ry="10" fill="hsl(${h},${s+8}%,${l-12}%)" opacity="0.4"/>
  </svg>`;
}

function checkAnswer() {
  if (answered) return;
  const val = document.getElementById('answerInput').value.trim();
  if (val === '') return;
  answered = true;
  document.getElementById('answerInput').disabled = true;
  document.getElementById('btnNext').style.display = 'inline-block';
  const fb = document.getElementById('feedback');
  if (parseInt(val) === correctDigit) {
    fb.textContent = '🎉 Risposta corretta!';
    fb.className = 'feedback correct';
    scoreOk++;
  } else {
    fb.textContent = `❌ La cifra nascosta era ${correctDigit}.`;
    fb.className = 'feedback wrong';
    scoreErr++;
  }
  updateScore();
}

function updateScore() {
  document.getElementById('scoreOk').textContent = scoreOk;
  document.getElementById('scoreErr').textContent = scoreErr;
}

function printWorksheet() {
  const container = document.getElementById('printSheet');
  container.innerHTML = '';

  const title = document.createElement('h1');
  title.className = 'ps-title';
  title.textContent = '☕ La Macchia di Caffè';
  container.appendChild(title);

  const isDecimal = (level === 'dec');
  const useVertical = (level === '1000' || level === '10000' || level === 'dec');

  const grid = document.createElement('div');
  grid.className = 'ps-grid' + (useVertical ? ' ps-grid-vert' : '');

  const NUM_EXERCISES = useVertical ? 8 : 15;

  for (let i = 0; i < NUM_EXERCISES; i++) {
    const { a, b, result, operation } = generateProblem();
    let tokA = numToTokens(a, isDecimal);
    let tokB = numToTokens(b, isDecimal);
    let tokR = numToTokens(result, isDecimal);
    if (isDecimal) [tokA, tokB, tokR] = normalizeDecimalTokens(tokA, tokB, tokR);

    const positions = [];
    tokA.forEach((t, idx) => { if (t.type === 'digit') positions.push({ num: 'a', idx }); });
    tokB.forEach((t, idx) => { if (t.type === 'digit') positions.push({ num: 'b', idx }); });
    tokR.forEach((t, idx) => { if (t.type === 'digit') positions.push({ num: 'r', idx }); });
    const chosen = positions[rand(0, positions.length - 1)];

    const cell = document.createElement('div');
    cell.className = 'ps-cell';

    const num = document.createElement('div');
    num.className = 'ps-num';
    num.textContent = (i + 1) + '.';
    cell.appendChild(num);

    if (!useVertical) {
      const row = document.createElement('div');
      row.className = 'ps-op-inline';
      row.appendChild(buildNumBox(tokA, chosen.num === 'a' ? chosen.idx : null));
      const opSign = document.createElement('div');
      opSign.className = 'ps-sign';
      opSign.textContent = operation;
      row.appendChild(opSign);
      row.appendChild(buildNumBox(tokB, chosen.num === 'b' ? chosen.idx : null));
      const eq = document.createElement('div');
      eq.className = 'ps-sign';
      eq.textContent = '=';
      row.appendChild(eq);
      row.appendChild(buildNumBox(tokR, chosen.num === 'r' ? chosen.idx : null));
      cell.appendChild(row);
    } else {
      const wrap = document.createElement('div');
      wrap.className = 'op-vertical';

      const wA = boxWidthPrint(tokA), wB = boxWidthPrint(tokB), wR = boxWidthPrint(tokR);
      const LABEL_W = 22 + 3;
      const lineW = Math.max(wA, wB, wR) + LABEL_W;

      const rowA = document.createElement('div');
      rowA.className = 'op-vert-row';
      const lblA = document.createElement('div');
      lblA.className = 'op-vert-label';
      lblA.textContent = '';
      rowA.appendChild(lblA);
      rowA.appendChild(buildNumBox(tokA, chosen.num === 'a' ? chosen.idx : null));
      wrap.appendChild(rowA);

      const rowB = document.createElement('div');
      rowB.className = 'op-vert-row';
      const lblB = document.createElement('div');
      lblB.className = 'op-vert-label';
      lblB.textContent = operation;
      rowB.appendChild(lblB);
      rowB.appendChild(buildNumBox(tokB, chosen.num === 'b' ? chosen.idx : null));
      wrap.appendChild(rowB);

      const line = document.createElement('div');
      line.className = 'op-vert-line';
      line.style.width = lineW + 'px';
      wrap.appendChild(line);

      const rowR = document.createElement('div');
      rowR.className = 'op-vert-row';
      const lblR = document.createElement('div');
      lblR.className = 'op-vert-label';
      lblR.textContent = '';
      rowR.appendChild(lblR);
      rowR.appendChild(buildNumBox(tokR, chosen.num === 'r' ? chosen.idx : null));
      wrap.appendChild(rowR);

      cell.appendChild(wrap);
    }

    grid.appendChild(cell);
  }
  container.appendChild(grid);

  const footer = document.createElement('div');
  footer.className = 'ps-footer';
  footer.innerHTML = `
    <img src="https://raw.githubusercontent.com/rdiianni-alt/matematichenonsinasce/main/logo.png" alt="Matematiche non si nasce">
    <div class="logo-text">Matematiche <span>non</span> si nasce</div>
  `;
  container.appendChild(footer);

  window.print();
}
</script>
