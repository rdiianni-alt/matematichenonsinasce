<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abaco Girevole</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0fce8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .logo {
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-decoration: none;
  }
  .logo img {
    width: 60px;
    height: 60px;
    object-fit: contain;
    border-radius: 50%;
  }
  .logo span {
    font-size: 1rem;
    color: #555;
    letter-spacing: 0.03em;
    font-style: italic;
  }

  .abaco {
    display: flex;
    gap: 12px;
    background: white;
    border: 4px solid #7bc67e;
    border-radius: 20px;
    padding: 28px 24px 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }

  .colonna {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .label {
    font-size: 0.72rem;
    font-weight: 700;
    color: #888;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    line-height: 1.2;
    min-height: 30px;
    display: flex;
    align-items: center;
  }

  .btn {
    width: 52px;
    height: 42px;
    border: none;
    border-radius: 12px;
    font-size: 1.4rem;
    cursor: pointer;
    transition: transform 0.1s, background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
  }

  .btn:active { transform: scale(0.92); }

  .btn-up   { background: #ff6eb4; color: white; }
  .btn-down { background: #ff6eb4; color: white; }

  .cifra-box {
    width: 72px;
    height: 90px;
    background: white;
    border: 3px solid #ddd;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    font-weight: 900;
    color: #222;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.07);
    transition: transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .cifra-box.animating {
    animation: flip 0.2s ease;
  }

  @keyframes flip {
    0%   { transform: scaleY(1); }
    40%  { transform: scaleY(0.1); }
    100% { transform: scaleY(1); }
  }

  /* separatore migliaia */
  .sep {
    font-size: 2.5rem;
    font-weight: 900;
    color: #bbb;
    align-self: center;
    margin-top: 52px;
    margin-bottom: 10px;
  }

  .reset-btn {
    margin-top: 28px;
    padding: 10px 28px;
    background: #7bc67e;
    color: white;
    border: none;
    border-radius: 30px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.2s;
  }
  .reset-btn:hover { background: #5aab5e; }

  @media (max-width: 480px) {
    .abaco {
      gap: 6px;
      padding: 18px 10px 16px;
      border-width: 3px;
      border-radius: 14px;
    }
    .cifra-box {
      width: 48px;
      height: 60px;
      font-size: 1.9rem;
      border-radius: 10px;
    }
    .btn {
      width: 36px;
      height: 32px;
      font-size: 1rem;
      border-radius: 8px;
    }
    .label {
      font-size: 0.55rem;
      min-height: 24px;
    }
    .sep {
      font-size: 1.6rem;
      margin-top: 36px;
      margin-bottom: 6px;
    }
    .logo img {
      width: 48px;
      height: 48px;
    }
    .logo span {
      font-size: 0.85rem;
    }
    .reset-btn {
      padding: 8px 22px;
      font-size: 0.85rem;
      margin-top: 18px;
    }
  }
</style>
</head>
<body>

<a class="logo" href="https://matematichenonsinasce.com/" >
  <img src="https://raw.githubusercontent.com/rdiianni-alt/quiz-matematica-prima/fca31cdfe65286a5abbf269e23429e4ddc479c78/logo.png" alt="logo">
  <span>Matematiche non si nasce</span>
</a>

<div class="abaco">
  <!-- Migliaia -->
  <div class="colonna">
    <div class="label">Unità di<br>migliaia</div>
    <button class="btn btn-up" onclick="cambia(0,1)">▲</button>
    <div class="cifra-box" id="c0">0</div>
    <button class="btn btn-down" onclick="cambia(0,-1)">▼</button>
  </div>

  <div class="sep">.</div>

  <!-- Centinaia -->
  <div class="colonna">
    <div class="label">Centinaia</div>
    <button class="btn btn-up" onclick="cambia(1,1)">▲</button>
    <div class="cifra-box" id="c1">0</div>
    <button class="btn btn-down" onclick="cambia(1,-1)">▼</button>
  </div>

  <!-- Decine -->
  <div class="colonna">
    <div class="label">Decine</div>
    <button class="btn btn-up" onclick="cambia(2,1)">▲</button>
    <div class="cifra-box" id="c2">0</div>
    <button class="btn btn-down" onclick="cambia(2,-1)">▼</button>
  </div>

  <!-- Unità -->
  <div class="colonna">
    <div class="label">Unità</div>
    <button class="btn btn-up" onclick="cambia(3,1)">▲</button>
    <div class="cifra-box" id="c3">0</div>
    <button class="btn btn-down" onclick="cambia(3,-1)">▼</button>
  </div>
</div>

<button class="reset-btn" onclick="reset()">↺ Ricomincia</button>

<script>
  const cifre = [0, 0, 0, 0];

  function cambia(col, dir) {
    cifre[col] = (cifre[col] + dir + 10) % 10;
    const box = document.getElementById('c' + col);
    box.classList.remove('animating');
    void box.offsetWidth; // reflow
    box.classList.add('animating');
    box.textContent = cifre[col];
  }

  function reset() {
    for (let i = 0; i < 4; i++) {
      cifre[i] = 0;
      document.getElementById('c' + i).textContent = '0';
    }
  }
</script>
</body>
</html>
