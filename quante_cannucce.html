<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cannucce</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', serif; background: #f0ebe0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px 10px; }

  a.logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; text-decoration: none; margin-bottom: 10px; }
  a.logo-wrap img { width: 60px; height: 60px; object-fit: contain; border-radius: 50%; }
  a.logo-wrap span { font-family: 'Georgia', serif; font-style: italic; font-size: 14px; color: #555; }

  h1 { font-size: 20px; font-weight: 600; color: #333; margin-bottom: 3px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 14px; text-align: center; }

  .level-btns { display: flex; gap: 10px; margin-bottom: 14px; }
  .level-btn {
    padding: 8px 20px; border: 2px solid #bbb; border-radius: 20px;
    font-size: 14px; font-family: 'Georgia', serif; cursor: pointer;
    background: #fff; color: #555; transition: all 0.2s;
  }
  .level-btn.active { background: #4a90d9; border-color: #4a90d9; color: #fff; font-weight: 600; }

  .card {
    background: #faf8f3; border-radius: 14px;
    box-shadow: 0 2px 14px rgba(0,0,0,0.09);
    padding: 18px 14px 22px;
    width: 100%; max-width: 560px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }

  .grid { width: 100%; display: grid; }
  .grid.with-hundreds { grid-template-columns: 1fr 1fr 1fr; }
  .grid.no-hundreds   { grid-template-columns: 1fr 1fr; }

  .col-label {
    font-family: 'Georgia', serif; font-style: italic;
    font-size: 22px; font-weight: normal; color: #222;
    text-align: center; padding-bottom: 6px;
    border-bottom: 2px solid #444;
  }
  .col-label.h  { border-right: 1.5px solid #555; }
  .col-label.da { border-right: 1.5px solid #555; }

  .col-content {
    height: 110px;
    display: flex; flex-direction: row;
    align-items: flex-end; justify-content: center;
    padding: 16px 4px 8px; gap: 4px;
  }
  .col-content.h  { border-right: 1.5px solid #555; }
  .col-content.da { border-right: 1.5px solid #555; }

  .input-row { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  input[type=number] {
    width: 100px; height: 46px; font-size: 26px; font-weight: 700;
    text-align: center; border: 2px solid #ccc; border-radius: 10px;
    outline: none; color: #222; background: #fff; -moz-appearance: textfield;
  }
  input::-webkit-inner-spin-button, input::-webkit-outer-spin-button { -webkit-appearance: none; }
  input:focus { border-color: #4a90d9; }

  .btn-check {
    background: #4a90d9; color: #fff; border: none; border-radius: 10px;
    padding: 11px 22px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .btn-check:hover { background: #357abd; }
  .btn-next {
    background: #5cb85c; color: #fff; border: none; border-radius: 10px;
    padding: 11px 22px; font-size: 15px; font-weight: 600; cursor: pointer; display: none;
  }
  .btn-next:hover { background: #449d44; }

  .feedback { font-size: 17px; font-weight: 600; min-height: 24px; text-align: center; }
  .feedback.ok  { color: #2e7d2e; }
  .feedback.err { color: #b02020; }
  .score { font-size: 13px; color: #999; }

  @media (max-width: 480px) {
    body { padding: 10px 6px; }
    a.logo-wrap img { width: 48px; height: 48px; }
    a.logo-wrap span { font-size: 12px; }
    h1 { font-size: 16px; }
    .subtitle { font-size: 11px; margin-bottom: 10px; }
    .level-btn { padding: 6px 12px; font-size: 12px; }
    .card { padding: 12px 8px 16px; gap: 10px; }
    .col-label { font-size: 17px; }
    .col-content { height: 80px; padding: 10px 2px 4px; gap: 2px; }
    input[type=number] { width: 76px; height: 40px; font-size: 22px; }
    .btn-check, .btn-next { padding: 9px 14px; font-size: 13px; }
    .feedback { font-size: 14px; }
  }
</style>
</head>
<body>

<a class="logo-wrap" href="https://matematichenonsinasce.com/" target="_self">
  <img src="https://raw.githubusercontent.com/rdiianni-alt/quiz-matematica-prima/fca31cdfe65286a5abbf269e23429e4ddc479c78/logo.png" alt="Logo">
  <span>Matematiche non si nasce</span>
</a>

<h1>Quante cannucce?</h1>
<p class="subtitle">Guarda la rappresentazione e scrivi il numero</p>

<div class="level-btns">
  <button class="level-btn active" onclick="setLevel(false, this)">Decine e unità</button>
  <button class="level-btn" onclick="setLevel(true, this)">Con le centinaia</button>
</div>

<div class="card">
  <div class="grid no-hundreds" id="grid">
    <div class="col-label da">da</div>
    <div class="col-label u">u</div>
    <div class="col-content da" id="tens-area"></div>
    <div class="col-content u"  id="units-area"></div>
  </div>

  <div class="input-row">
    <input type="number" id="answer" placeholder="?" min="1" max="999" />
    <button class="btn-check" onclick="checkAnswer()">Verifica</button>
    <button class="btn-next" id="btn-next" onclick="nextRound()">Avanti ▶</button>
  </div>
  <div class="feedback" id="feedback"></div>
  <div class="score" id="score">Punti: 0 / 0</div>
</div>

<script>
const H=90, HW=22, BW=10, UW=3;
let target=0, hundreds=0, tens=0, units=0, correct=0, total=0, useHundreds=false;

function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function makeCanvas(w,h){ const c=document.createElement('canvas'); c.width=w; c.height=h; c.style.display='block'; return c; }

function drawHundred(parent){ 
  const cv=makeCanvas(HW,H); const ctx=cv.getContext('2d');
  ctx.fillStyle='#111'; ctx.fillRect(0,0,HW,H);
  ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=0.8;
  for(let i=1;i<10;i++){ const y=Math.round(H/10*i); ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(HW,y); ctx.stroke(); }
  ctx.strokeStyle='#2e7d32'; ctx.lineWidth=1.8;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(HW,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(HW,0); ctx.lineTo(0,H); ctx.stroke();
  parent.appendChild(cv);
}

function drawBundle(parent){
  const cv=makeCanvas(BW,H); const ctx=cv.getContext('2d');
  ctx.fillStyle='#111'; ctx.fillRect(0,0,BW,H);
  ctx.strokeStyle='#c8860a'; ctx.lineWidth=1.5;
  const by=Math.round(H*0.58);
  ctx.beginPath(); ctx.moveTo(0,by); ctx.lineTo(BW,by); ctx.stroke();
  parent.appendChild(cv);
}

function drawLoose(parent){
  const cv=makeCanvas(UW+2,H); const ctx=cv.getContext('2d');
  ctx.fillStyle='#111'; ctx.fillRect(1,0,UW,H);
  parent.appendChild(cv);
}

// Spacer div for subitizing gap after 5th element
function addSpacer(parent, w){
  const s=document.createElement('div');
  s.style.cssText='width:'+w+'px;height:1px;flex-shrink:0;';
  parent.appendChild(s);
}

function fillArea(area, count, drawFn, spacerW){
  for(let i=0;i<count;i++){
    if(i===5) addSpacer(area, spacerW);
    drawFn(area);
  }
}

function setLevel(withH, btn){
  useHundreds = withH;
  document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const grid = document.getElementById('grid');
  if(withH){
    grid.className='grid with-hundreds';
    if(!document.getElementById('hundreds-area')){
      const lbl=document.createElement('div'); lbl.className='col-label h'; lbl.textContent='h';
      const area=document.createElement('div'); area.className='col-content h'; area.id='hundreds-area';
      grid.insertBefore(area, grid.children[2]);
      grid.insertBefore(lbl, grid.children[0]);
    }
  } else {
    grid.className='grid no-hundreds';
    const hl=grid.querySelector('.col-label.h');
    const ha=document.getElementById('hundreds-area');
    if(hl) hl.remove();
    if(ha) ha.remove();
  }
  correct=0; total=0;
  document.getElementById('score').textContent='Punti: 0 / 0';
  nextRound();
}

function generateRound(){
  hundreds = useHundreds ? rnd(0,9) : 0;
  tens  = rnd(0,9);
  units = rnd(0,9);
  if(hundreds===0 && tens===0 && units===0) units=rnd(1,9);
  target = hundreds*100 + tens*10 + units;

  const tA=document.getElementById('tens-area');
  const uA=document.getElementById('units-area');
  tA.innerHTML=''; uA.innerHTML='';
  fillArea(tA, tens,  drawBundle, 8);
  fillArea(uA, units, drawLoose,  6);

  if(useHundreds){
    const hA=document.getElementById('hundreds-area');
    hA.innerHTML='';
    fillArea(hA, hundreds, drawHundred, 8);
  }
}

function checkAnswer(){
  const val=parseInt(document.getElementById('answer').value);
  const fb=document.getElementById('feedback');
  if(isNaN(val)){ fb.textContent='Inserisci un numero!'; fb.className='feedback err'; return; }
  total++;
  if(val===target){
    correct++;
    fb.textContent='✓ Esatto! Era '+target;
    fb.className='feedback ok';
  } else {
    let msg='✗ Era '+target;
    if(useHundreds) msg+=' — '+hundreds+' cent., ';
    else msg+=' — ';
    msg+=tens+' dec., '+units+' unità';
    fb.textContent=msg; fb.className='feedback err';
  }
  document.getElementById('score').textContent='Punti: '+correct+' / '+total;
  document.querySelector('.btn-check').style.display='none';
  document.getElementById('btn-next').style.display='inline-block';
}

function nextRound(){
  document.getElementById('answer').value='';
  document.getElementById('feedback').textContent='';
  document.querySelector('.btn-check').style.display='inline-block';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('answer').focus();
  generateRound();
}

document.getElementById('answer').addEventListener('keydown', e=>{
  if(e.key!=='Enter') return;
  if(document.getElementById('btn-next').style.display==='inline-block') nextRound();
  else checkAnswer();
});

generateRound();
</script>
</body>
</html>
