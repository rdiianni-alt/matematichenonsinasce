<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matematiche Non Si Nasce</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #ffffff;
      padding: 3rem 1.5rem 2.5rem;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    header img.logo {
      width: 110px; height: 110px;
      border-radius: 50%;
      margin-bottom: 1.25rem;
      object-fit: contain;
    }

    header h1 {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: 0.04em;
      line-height: 1.2;
      white-space: nowrap;
    }

    header p {
      margin-top: 0.6rem;
      font-size: 1.05rem;
      color: #e10600;
      font-weight: 700;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #e10600;
      margin-bottom: 1.25rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 1.5rem 1.25rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      border: 2px solid #1a1a1a;
      box-shadow: 4px 4px 0 #1a1a1a;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }

    .card:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 #e10600;
      border-color: #e10600;
    }

    .card .emoji { font-size: 2rem; line-height: 1; }

    .card h2 {
      font-size: 1.05rem;
      font-weight: 900;
      color: #1a1a1a;
      line-height: 1.3;
    }

    .card p.desc {
      font-size: 0.85rem;
      color: #777;
      font-weight: 700;
      flex: 1;
    }

    .card .play {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      font-weight: 900;
      color: #e10600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #status {
      text-align: center;
      padding: 2rem;
      font-weight: 700;
      color: #aaa;
      font-size: 1rem;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8rem;
      color: #999;
      font-weight: 700;
      border-top: 2px solid #1a1a1a;
    }
  </style>
</head>
<body>

<header>
  <img src="https://rdiianni-alt.github.io/matematichenonsinasce/logo.png" alt="Logo" class="logo" onerror="this.style.display='none'" />
  <h1>Matematiche Non Si Nasce</h1>
  <p>Giochi di matematica per la LIM e non solo 🎲</p>
</header>

<main>
  <p class="section-label">Scegli un gioco</p>
  <div id="status">Carico i giochi…</div>
  <div class="grid" id="grid"></div>
</main>

<footer>
  © Rita Di Ianni · matematichenonsinasce · fatto con ❤️ per imparare
</footer>

<script>
  // ── Configurazione ──────────────────────────────────────────────
  const GITHUB_USER = "rdiianni-alt";
  const GITHUB_REPO = "matematichenonsinasce";
  const PAGES_BASE  = `https://${GITHUB_USER}.github.io/${GITHUB_REPO}`;

  // Emoji e descrizioni per i giochi che già conosci.
  // Se carichi un nuovo gioco non in questa lista, verrà comunque
  // mostrato con emoji e descrizione di default.
  const META = {
    "bee_game":                    { emoji: "🐝", desc: "Coding con le api" },
    "bruco":                       { emoji: "🐛", desc: "Il Bruco Mangianumeri!" },
    "cannucce":                    { emoji: "🥤", desc: "Cannucce per contare" },
    "chiudi_la_scatola":           { emoji: "📦", desc: "Shut the box!" },
    "gambero rosso":               { emoji: "🦞", desc: "Dov'è nascosto gambero Rosso?" },
    "gioco_carte_completo":        { emoji: "🃏", desc: "Maggiore, minore o uguale?" },
        "giro_le_cifre":        { emoji: "🃏", desc: "Operazioni con abaco delle cifre" },
    "pallottoliere_per_operazioni":{ emoji: "🔢", desc: "Il pallottoliere" },
    "scatolina":                   { emoji: "🎁", desc: "Scatolina gialla" },
    "supermercato":                { emoji: "🛒", desc: "Fai la spesa con i numeri" },
  };

  // ── Funzioni di supporto ────────────────────────────────────────
  function slugToTitle(slug) {
    return slug
      .replace(/_/g, " ")
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  function createCard(filename) {
    const slug = filename.replace(/\.html$/i, "");
    const m = META[slug] || {};
    const emoji = m.emoji || "👻";
    const desc  = m.desc  || "Sottrazioni a mente";
    const title = slugToTitle(slug);

    const a = document.createElement("a");
    a.className = "card";
    a.href = `${PAGES_BASE}/${filename}`;
    a.target = "_blank";
    a.rel = "noopener";
    a.innerHTML = `
      <span class="emoji">${emoji}</span>
      <h2>${title}</h2>
      <p class="desc">${desc}</p>
      <span class="play">▶ Gioca</span>
    `;
    return a;
  }

  // ── Caricamento dal API GitHub ──────────────────────────────────
  async function loadGames() {
    const statusEl = document.getElementById("status");
    const gridEl   = document.getElementById("grid");

    try {
      const res = await fetch(
        `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`,
        { headers: { "Accept": "application/vnd.github.v3+json" } }
      );

      if (!res.ok) throw new Error(`GitHub API: ${res.status}`);
      const files = await res.json();

      const games = files
        .filter(f => f.type === "file" && f.name.endsWith(".html") && f.name !== "index.html")
        .sort((a, b) => a.name.localeCompare(b.name));

      statusEl.style.display = "none";

      if (games.length === 0) {
        statusEl.style.display = "block";
        statusEl.textContent = "Nessun gioco trovato. Carica qualche file .html nel repository!";
        return;
      }

      games.forEach(f => gridEl.appendChild(createCard(f.name)));

    } catch (err) {
      statusEl.textContent = "Errore nel caricare i giochi. Riprova più tardi.";
      console.error(err);
    }
  }

  loadGames();

  // ── Comunica l'altezza al sito che ci ospita (es. WordPress) ────
  // Così, se questa pagina viene mostrata dentro un <iframe>,
  // l'iframe può adattare la propria altezza automaticamente,
  // anche quando vengono aggiunti nuovi giochi.
  function sendHeightToParent() {
    const height = document.body.scrollHeight;
    window.parent.postMessage({ type: "matematiche-resize", height: height }, "*");
  }

  window.addEventListener("load", sendHeightToParent);
  window.addEventListener("resize", sendHeightToParent);

  // Ricalcola anche quando i giochi vengono inseriti nella griglia
  const resizeObserver = new ResizeObserver(sendHeightToParent);
  resizeObserver.observe(document.body);
</script>

</body>
</html>
