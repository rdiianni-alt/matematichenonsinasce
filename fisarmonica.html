<div style="display:flex;flex-direction:column;align-items:center;gap:4px;margin-bottom:1rem">
  <a href="https://matematichenonsinasce.com/" target="_blank" class="logo">
    <img src="https://raw.githubusercontent.com/rdiianni-alt/matematichenonsinasce/main/logo.png" alt="Logo Matematiche non si nasce">
  </a>
  <a href="https://matematichenonsinasce.com/" target="_blank" style="font-size:.85rem;color:#3B6D11;text-decoration:none;font-weight:500">Matematiche non si nasce</a>
</div>
<h2 style="text-align:center;font-size:1.2rem;font-weight:500;margin-bottom:.8rem;color:var(--color-text-primary)">La fisarmonica</h2>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,sans-serif);padding:1.2rem;color:var(--color-text-primary);max-width:560px;margin:0 auto;display:flex;flex-direction:column;align-items:center}
#fase1,#fase2{width:100%;max-width:360px}
#fase1,#fase2{display:none;flex-direction:column;gap:12px}
#fase1{display:flex}
#display{font-size:2.4rem;font-weight:500;letter-spacing:4px;text-align:center;padding:14px 12px;border:2px solid #9fc08a;border-radius:10px;background:#eef5e8;color:#3B6D11;min-height:66px;word-break:break-all}
#display.vuoto{color:#aaa;font-size:1.2rem;font-weight:400;letter-spacing:0}
#tastierino{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.tasto{padding:14px 0;font-size:1.3rem;font-weight:500;border:1px solid #c8dfc0;border-radius:8px;background:#f5faf2;color:#3B6D11;cursor:pointer;text-align:center;transition:background .12s}
.tasto:hover{background:#ddf0d4}
.tasto:active{background:#c8dfc0}
.tasto.zero{grid-column:1/3}
.tasto.canc{background:#fff0f3;color:#c0395a;border-color:#f0b8c8}
.tasto.canc:hover{background:#fcd8e2}
#btn-mostra{padding:13px;font-size:1rem;font-weight:500;border-radius:8px;cursor:pointer;border:none;background:#3B6D11;color:#fff}
#btn-mostra:hover{background:#2d5409}
.logo img{width:60px;height:60px;object-fit:contain;border-radius:50%}
#wrap-outer{display:flex;justify-content:center}

/* griglia fisarmonica — posizionamento assoluto per animazione */
#grid{position:relative}
.gcell{
  position:absolute;
  width:58px;height:54px;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #9fc08a;border-radius:7px;
  background:#eef5e8;font-size:1.4rem;font-weight:500;color:#3B6D11;
  transition:top .45s ease, background .45s ease, color .45s ease, border-color .45s ease;
}
.gcell.zero{background:#f5faf2;color:#aac49a}
.gcell.empty{background:transparent;border-color:transparent;color:transparent}
.gcell.sp{background:transparent;border-color:transparent;color:transparent}
.gop{
  position:absolute;
  width:30px;height:54px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.15rem;font-weight:500;color:#d44a7a;
  transition:top .45s ease, color .45s ease;
}
.gop.empty{color:transparent}

#btn-piega{padding:10px;font-size:1rem;border-radius:8px;cursor:pointer;font-weight:500;border:1.5px solid #9fc08a;background:#f5faf2;color:#3B6D11}
#btn-piega:hover{background:#ddf0d4}
#btn-ricomincia{padding:8px;font-size:.9rem;border-radius:8px;cursor:pointer;border:1px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary)}
</style>

<div id="fase1">
  <div id="display" class="vuoto">scrivi un numero</div>
  <div id="tastierino">
    <div class="tasto" data-n="1">1</div><div class="tasto" data-n="2">2</div><div class="tasto" data-n="3">3</div>
    <div class="tasto" data-n="4">4</div><div class="tasto" data-n="5">5</div><div class="tasto" data-n="6">6</div>
    <div class="tasto" data-n="7">7</div><div class="tasto" data-n="8">8</div><div class="tasto" data-n="9">9</div>
    <div class="tasto zero" data-n="0">0</div><div class="tasto canc" id="btn-canc">⌫</div>
  </div>
  <button id="btn-mostra">Mostra la fisarmonica</button>
</div>

<div id="fase2">
  <div id="wrap-outer"><div id="grid"></div></div>
  <button id="btn-piega">Chiudi fisarmonica</button>
  <button id="btn-ricomincia">← Altro numero</button>
</div>

<script>
var numStr='', digits=[], folded=false, animating=false;
var F1=document.getElementById('fase1');
var F2=document.getElementById('fase2');
var display=document.getElementById('display');
var CW=58, OW=30, CH=54, GAP=6;
// elementi della griglia: cells[row][col], ops[row][col] (op a destra di col)
var cells=[], ops=[], opRight=[];
// row 0 = centinaia, row n-1 = unità
// stato corrente di ogni cella: quale cifra mostra e in quale riga si trova visivamente
var state=[];

document.getElementById('tastierino').addEventListener('click',function(e){
  var t=e.target.closest('.tasto[data-n]');
  if(!t||numStr.length>=9)return;
  numStr+=t.dataset.n;
  if(numStr.length>1&&numStr[0]==='0')numStr=numStr.slice(1);
  aggDisplay();
});
document.getElementById('btn-canc').addEventListener('click',function(){numStr=numStr.slice(0,-1);aggDisplay();});
function aggDisplay(){
  if(!numStr){display.textContent='scrivi un numero';display.className='vuoto';}
  else{display.textContent=numStr;display.className='';}
}

document.getElementById('btn-mostra').addEventListener('click',function(){
  if(!numStr){flash();return;}
  digits=numStr.split('').map(Number);
  folded=false;
  F1.style.display='none';
  F2.style.display='flex';
  document.getElementById('btn-piega').textContent='Apri fisarmonica';
  folded=true;
  render();
  // parte chiusa: tutte le righe sotto la 0 già sulla riga 0
  setTimeout(function(){
    var n=digits.length;
    for(var r=1;r<n;r++){
      for(var col=0;col<n;col++){
        cells[r][col].style.transition='none';
        cells[r][col].style.top=rowY(0)+'px';
      }
      opRight[r].style.transition='none';
      opRight[r].style.top=rowY(0)+'px';
      opRight[r].classList.add('empty');
    }
  },0);
});
function flash(){display.style.border='2px solid #e24b4a';setTimeout(function(){display.style.border='2px solid #9fc08a';},600);}

document.getElementById('btn-ricomincia').addEventListener('click',function(){
  numStr='';aggDisplay();folded=false;
  F2.style.display='none';F1.style.display='flex';
});

document.getElementById('btn-piega').addEventListener('click',function(){
  if(animating)return;
  folded=!folded;
  this.textContent=folded?'Chiudi fisarmonica':'Apri fisarmonica';
  if(!folded) animaApri();
  else animaChiudi();
});

function colX(col){ return col*(CW+OW); }
function rowY(row){ return row*(CH+GAP); }

function render(){
  var n=digits.length;
  var grid=document.getElementById('grid');
  grid.innerHTML='';
  cells=[]; ops=[]; opRight=[]; state=[];
  var totalW=n*CW+(n-1)*OW+OW; // +OW per il + finale
  var totalH=n*(CH+GAP)-GAP;
  grid.style.width=totalW+'px';
  grid.style.height=totalH+'px';

  for(var r=0;r<n;r++){
    cells[r]=[]; ops[r]=[]; state[r]=[];
    for(var col=0;col<n;col++){
      var el=document.createElement('div');
      var isSp=col<r;
      var isMain=col===r;
      var isZero=col>r;
      el.className='gcell'+(isSp?' sp':isZero?' zero':'');
      el.textContent=isSp?'': (isMain?digits[r]:0);
      el.style.left=colX(col)+'px';
      el.style.top=rowY(r)+'px';
      grid.appendChild(el);
      cells[r][col]=el;
      state[r][col]={row:r, val:isSp?null:(isMain?digits[r]:0), isSp:isSp, isMain:isMain};

      // op tra celle
      if(col<n-1){
        var op=document.createElement('div');
        op.className='gop';
        op.textContent='';
        op.style.left=(colX(col)+CW)+'px';
        op.style.top=rowY(r)+'px';
        grid.appendChild(op);
        ops[r][col]=op;
      }
    }
    // + a destra della riga
    var opr=document.createElement('div');
    opr.className='gop';
    opr.textContent=r<n-1?'+':'';
    opr.style.left=(colX(n-1)+CW)+'px';
    opr.style.top=rowY(r)+'px';
    grid.appendChild(opr);
    opRight[r]=opr;
  }
}

// Chiudi: dal basso verso l'alto
// step k: la riga (n-1-k) collassa nella riga (n-2-k)
// le cifre significative (non sp, non zero) della riga src
// salgono nella stessa colonna della riga dst, sostituendo lo zero
function animaChiudi(){
  var n=digits.length;
  animating=true;
  var step=0;
  function doStep(){
    if(step>=n-1){animating=false;return;}
    var src=n-1-step;
    var dst=src-1;

    // le cifre significative di src (dalla col src in poi, tranne gli zeri aggiunti)
    // sono: la cifra principale di src (col=src) + eventuali cifre già salite lì
    // in realtà tracciamo: per ogni colonna col>=src, la cella src[col] va in dst[col]
    for(var col=src;col<n;col++){
      var srcCell=cells[src][col];
      var dstCell=cells[dst][col];
      // anima srcCell verso la posizione di dst
      srcCell.style.top=rowY(dst)+'px';
      // quando arriva, aggiorna dstCell e nascondi srcCell
      (function(sc,dc,c,d){
        setTimeout(function(){
          dc.textContent=sc.textContent;
          dc.className='gcell'; // non più zero
          sc.className='gcell empty';
        },460);
      })(srcCell, dstCell, col, dst);
    }

    // nascondi il + a destra di src
    opRight[src].classList.add('empty');
    // nascondi anche il + a destra di dst se non è già nascosto
    // (dst diventa l'ultima riga visibile dopo questo step)
    // ma solo se dst>0 lasciamo il + di dst, se dst===0 togliamo tutto
    if(dst===0) setTimeout(function(){ opRight[0].classList.add('empty'); },460);

    step++;
    setTimeout(doStep, 500);
  }
  doStep();
}

function animaApri(){
  var n=digits.length;
  animating=true;

  // Stato iniziale: tutto sulla riga 0, celle mostrano il numero intero
  // Preparo senza transizione
  for(var r=0;r<n;r++){
    for(var col=0;col<n;col++){
      var isSp=col<r;
      var isMain=col===r;
      var el=cells[r][col];
      el.style.transition='none';
      el.style.top=rowY(0)+'px';
      el.className='gcell'+(isSp?' sp':(!isMain)?' zero':'');
      el.textContent=isSp?'':(isMain?digits[r]:0);
    }
    opRight[r].style.transition='none';
    opRight[r].classList.remove('empty');
    opRight[r].textContent=r<n-1?'+':'';
    opRight[r].style.top=rowY(0)+'px';
  }

  // forza reflow
  document.getElementById('grid').getBoundingClientRect();

  // riattiva transizioni
  var all=document.querySelectorAll('#grid .gcell, #grid .gop');
  all.forEach(function(el){ el.style.transition=''; });

  // Apertura: scende prima il gruppo più grande (dal basso)
  // step 0: le righe 1..n-1 scendono tutte insieme alla posizione 1 (staccandosi dalla 0)
  // step 1: le righe 2..n-1 scendono tutte insieme alla posizione 2
  // ...
  // step k: le righe k..n-1 scendono di un posto
  for(var step=0;step<n-1;step++){
    (function(s){
      setTimeout(function(){
        // le righe da s+1 in giù scendono ciascuna di 1
        for(var r=s+1;r<n;r++){
          var targetRow=r; // la riga r va alla sua posizione finale r
          // ma lo facciamo un passo alla volta: dopo step s, la riga r è a posizione s (se r>s)
          // quindi ora la portiamo a s+1
          var curY=rowY(s);
          var nextY=rowY(s+1);
          for(var col=0;col<n;col++){
            cells[r][col].style.top=nextY+'px';
          }
          opRight[r].style.top=nextY+'px';
        }
        if(s===n-2) setTimeout(function(){animating=false;},460);
      }, s*500);
    })(step);
  }
}
</script>
