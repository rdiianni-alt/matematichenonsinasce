<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Schieramenti di Fagioli</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f7ff; min-height: 100vh; padding: 12px; }

  /* LOGO */
  .header { text-align: center; margin-bottom: 16px; }
  .header a { text-decoration: none; display: inline-flex; flex-direction: column; align-items: center; gap: 6px; }
  .header img { width: 60px; height: 60px; object-fit: contain; border-radius: 50%; }
  .header span { font-size: 14px; font-weight: bold; color: #2e7d32; letter-spacing: 0.3px; }

  h1 { text-align: center; font-size: 24px; color: #2e7d32; margin-bottom: 4px; }
  .sub { text-align: center; color: #888; font-size: 12px; margin-bottom: 16px; }

  .card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 14px; max-width: 560px; margin-left: auto; margin-right: auto; }

  button { cursor: pointer; border: none; border-radius: 12px; font-weight: bold; font-size: 15px; padding: 10px 22px; transition: all 0.15s; }
  .btn-green { background: linear-gradient(135deg,#4caf50,#2196f3); color:#fff; }
  .btn-orange { background: linear-gradient(135deg,#ff9800,#e91e63); color:#fff; }
  .btn-gray { background: #90a4ae; color:#fff; }
  .btn-sol { background: #ff9800; color:#fff; }
  .btn-sol.active { background: #ff7043; }
  .btns { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 12px; }

  .big-num { font-size: 52px; font-weight: bold; color: #2196f3; line-height: 1; }
  .label { font-size: 16px; color: #555; margin-bottom: 10px; }
  .info { color: #555; font-size: 14px; margin-bottom: 6px; }

  input[type=number] { font-size: 24px; width: 100px; text-align: center; border-radius: 10px; border: 2px solid #e91e63; padding: 6px 10px; outline: none; }

  .grid { display: flex; flex-wrap: wrap; justify-content: center; }
  .sch { display: inline-flex; flex-direction: column; gap: 3px; padding: 8px; background: #f9f9f9; border: 2px solid #ddd; border-radius: 10px; margin: 4px; cursor: pointer; transition: all 0.2s; }
  .sch.found { background: #fffde7; border-color: #f9a825; }
  .sch.dimmed { opacity: 0.3; }
  .sch-label { text-align: center; font-weight: bold; font-size: 13px; color: #555; margin-top: 4px; }
  .row-f { display: flex; gap: 3px; }

  .counter { color: #888; font-size: 13px; margin-bottom: 8px; }
  .success { background: #e8f5e9; border-radius: 10px; padding: 10px; font-weight: bold; color: #2e7d32; font-size: 15px; margin-top: 8px; text-align: center; }
  .primo { background: #fff9c4; border-radius: 10px; padding: 10px; font-size: 13px; color: #555; margin-top: 8px; text-align: center; }
  .quadrato { background: #fff9c4; border-radius: 10px; padding: 10px; font-size: 13px; color: #555; margin-top: 8px; text-align: center; }

  .intro-btns { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .intro-btns button { width: 260px; font-size: 17px; padding: 14px; border-radius: 14px; }
</style>
</head>
<body>

<div class="header">
  <a href="https://matematichenonsinasce.com/" >
    <img src="https://raw.githubusercontent.com/rdiianni-alt/quiz-matematica-prima/fca31cdfe65286a5abbf269e23429e4ddc479c78/logo.png" alt="Logo" />
    <span>Matematiche non si nasce</span>
  </a>
</div>

<h1>🫘 Schieramenti di Fagioli</h1>

<div id="app"></div>

<script>
const CARTE = [8,9,12,14,16,18,20,24,25,30,36,49,50,64];
let mazzo = shuffle([...CARTE, "?"]);
let idx = 0;
let cartaCorrente = null;
let numeroProprio = "";
let trovati = {};
let mostraSol = false;
let fase = "intro";

function shuffle(a) { return a.sort(() => Math.random() - 0.5); }

function getDivisori(n) {
  const res = [];
  for (let i = 2; i <= Math.sqrt(n); i++) {
    if (n % i === 0) {
      res.push([i, n / i]);
      if (i !== n / i) res.push([n / i, i]);
    }
  }
  res.sort((a, b) => a[0] - b[0]);
  return res;
}

function fagiolo() {
  return `<svg width="14" height="18" viewBox="0 0 30 38" style="display:inline-block">
    <ellipse cx="15" cy="20" rx="13" ry="17" fill="#c8a96e" stroke="#8B6914" stroke-width="1.5"/>
    <ellipse cx="15" cy="20" rx="9" ry="13" fill="#d4b882"/>
    <path d="M10 14 Q15 10 20 14" fill="none" stroke="#8B6914" stroke-width="1"/>
    <circle cx="11" cy="22" r="2.5" fill="#fff" opacity="0.3"/>
  </svg>`;
}

function renderSchieramento(r, c, key) {
  const found = trovati[key];
  const dimmed = mostraSol && !found;
  let rows = "";
  for (let i = 0; i < r; i++) {
    let cols = "";
    for (let j = 0; j < c; j++) cols += fagiolo();
    rows += `<div class="row-f">${cols}</div>`;
  }
  return `<div class="sch ${found ? 'found' : ''} ${dimmed ? 'dimmed' : ''}" onclick="toggleTrovato('${key}')">
    ${rows}
    <div class="sch-label">${r}×${c}</div>
  </div>`;
}

function toggleTrovato(key) {
  trovati[key] = !trovati[key];
  render();
}

function estraiCarta() {
  if (idx >= mazzo.length) { mazzo = shuffle([...CARTE, "?"]); idx = 0; }
  cartaCorrente = mazzo[idx++];
  trovati = {}; mostraSol = false;
  if (cartaCorrente === "?") { numeroProprio = ""; fase = "jolly"; }
  else fase = "gioco";
  render();
}

function render() {
  const app = document.getElementById("app");
  const n = cartaCorrente === "?" ? parseInt(numeroProprio) : cartaCorrente;
  const soluzioni = (n > 1 && !isNaN(n)) ? getDivisori(n) : [];
  const trovatiCount = Object.values(trovati).filter(Boolean).length;
  const isPrimo = soluzioni.length === 0 && n > 1 && !isNaN(n);
  const isQuadrato = n && Number.isInteger(Math.sqrt(n)) && Math.sqrt(n) > 1;

  if (fase === "intro") {
    app.innerHTML = `
      <div class="card">
        <div style="font-size:42px;text-align:center;margin-bottom:10px">🫘</div>
        <p style="color:#444;line-height:1.7;font-size:14px;margin-bottom:16px">
          Prova a creare <strong>quanti più schieramenti riesci</strong> con i fagioli a disposizione
          (esclusa la fila indiana 1×n).<br><br>
          Disegna sul quaderno quelli che trovi, poi guarda la soluzione!
        </p>
        <div class="intro-btns">
          <button class="btn-green" onclick="estraiCarta()">🎴 Estrai una carta</button>
          <button class="btn-orange" onclick="fase='jolly';numeroProprio='';cartaCorrente='?';render()">🃏 Scelgo io il numero!</button>
        </div>
      </div>`;
    return;
  }

  if (fase === "jolly") {
    app.innerHTML = `
      <div class="card" style="text-align:center">
        <div style="font-size:36px">🃏</div>
        <h2 style="color:#e91e63;margin:8px 0">Carta JOLLY!</h2>
        <p style="color:#555;margin-bottom:12px">Scegli tu quanti fagioli usare:</p>
        <input type="number" min="2" max="200" id="numInput" value="${numeroProprio}" placeholder="es. 36" oninput="numeroProprio=this.value" />
        <br><br>
        <button class="btn-orange" onclick="if(parseInt(numeroProprio)>=2){fase='gioco';render();}">Inizia!</button>
        <br><br>
        <button class="btn-gray" onclick="fase='intro';render()">🏠 Inizio</button>
      </div>`;
    return;
  }

  // GIOCO
  let solHtml = "";
  if (mostraSol) {
    let schHtml = soluzioni.map(([r, c]) => renderSchieramento(r, c, `${r}x${c}`)).join("");
    let extra = isPrimo
      ? `<div class="primo">Questo numero non ha schieramenti (esclusa la fila indiana)!<br>È un <strong>numero primo</strong> 🌟</div>`
      : isQuadrato
        ? `<div class="quadrato">⭐ <strong>${n}</strong> è un <strong>numero quadrato</strong>! Uno degli schieramenti forma un quadrato perfetto.</div>`
        : "";
    let ok = (!isPrimo && trovatiCount === soluzioni.length && soluzioni.length > 0)
      ? `<div class="success">🎉 Esatto! Hai trovato tutti gli schieramenti!</div>` : "";
    solHtml = `
      <div class="card">
        <div style="font-weight:bold;color:#2e7d32;font-size:16px;text-align:center;margin-bottom:4px">
          Tutti gli schieramenti di ${n} — clicca quelli che hai trovato!
        </div>
        <div class="counter" style="text-align:center">Trovati: ${trovatiCount} / ${soluzioni.length}</div>
        <div class="grid">${schHtml}</div>
        ${extra}${ok}
      </div>`;
  }

  app.innerHTML = `
    <div class="card" style="text-align:center">
      <div style="font-size:13px;color:#888;margin-bottom:4px">Hai estratto:</div>
      <div class="big-num">${cartaCorrente === "?" ? numeroProprio : n}</div>
      <div class="label">fagioli</div>
      <div class="info">Disegna sul quaderno tutti gli schieramenti che riesci a trovare,<br>
      poi clicca <strong>"Mostra soluzione"</strong> per verificare!</div>
    </div>
    <div class="btns">
      <button class="btn-sol ${mostraSol ? 'active' : ''}" onclick="mostraSol=!mostraSol;render()">
        ${mostraSol ? "🙈 Nascondi soluzione" : "👀 Mostra soluzione"}
      </button>
      <button class="btn-green" onclick="estraiCarta()">🎴 Nuova carta</button>
      <button class="btn-gray" onclick="fase='intro';cartaCorrente=null;numeroProprio='';mostraSol=false;trovati={};render()">🏠 Inizio</button>
    </div>
    ${solHtml}`;
}

render();
</script>
</body>
</html>
