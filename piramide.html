<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piramide dei Numeri</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #fdf8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px;
    color: #3a2e1e;
  }

  header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .logo img {
    width: 60px; height: 60px;
    object-fit: contain;
    border-radius: 50%;
  }

  .site-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: #4a90b8;
    text-align: center;
  }

  .blog-title {
    font-size: 1.2rem;
    font-weight: 700;
    color: #3a2e1e;
    text-align: center;
  }

  .footer-intro {
    max-width: 420px;
    text-align: center;
    font-size: 0.88rem;
    color: #5a4a30;
    line-height: 1.6;
    margin-top: 18px;
  }

  .intro {
    max-width: 480px;
    text-align: center;
    font-size: 0.92rem;
    color: #5a4a30;
    line-height: 1.6;
    margin-bottom: 18px;
  }

  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
    align-items: center;
  }

  .level-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid #c4a882;
    background: #fdf8f0;
    color: #7a5c2e;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .level-btn:hover, .level-btn.active {
    background: #c4a882;
    color: #fff;
  }

  .action-btn {
    padding: 7px 18px;
    border-radius: 20px;
    border: 1.5px solid #a07850;
    background: #a07850;
    color: #fff;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .action-btn:hover { background: #7a5c2e; border-color: #7a5c2e; }

  .pyramid-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    margin-bottom: 20px;
  }

  .row {
    display: flex;
    gap: 3px;
    justify-content: center;
  }

  .pyramid-wrap {
    width: 100%;
  }

  .brick {
    width: clamp(38px, 12vw, 58px);
    height: clamp(30px, 9vw, 42px);
    border: 1.5px solid #c4a882;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(0.7rem, 3vw, 1rem);
    font-weight: 600;
    background: #fff;
    color: #3a2e1e;
  }

  .brick.given {
    background: #f5eedd;
    color: #5a3e1e;
  }

  .brick input {
    width: 100%; height: 100%;
    border: none;
    outline: none;
    text-align: center;
    font-size: 1rem;
    font-weight: 600;
    color: #3a2e1e;
    background: transparent;
  }

  .brick.correct { background: #eaf4e8; border-color: #8ab88a; }
  .brick.wrong   { background: #faeaea; border-color: #c49090; }

  .result-box {
    font-size: 1rem;
    font-weight: 600;
    color: #7a5c2e;
    text-align: center;
    margin-bottom: 14px;
    display: none;
    min-height: 1.5em;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* separator */
  .sep { color: #c4a882; font-size: 1rem; align-self: center; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <a href="https://matematichenonsinasce.com/" target="_blank">
      <img src="https://raw.githubusercontent.com/rdiianni-alt/quiz-matematica-prima/fca31cdfe65286a5abbf269e23429e4ddc479c78/logo.png" alt="logo">
    </a>
  </div>
  <div class="site-title">Le piramidi dei numeri</div>
</header>



<div class="controls">
  <button class="level-btn active" id="btn-small" onclick="setMode('small')">𓂀 Livello 1</button>
  <button class="level-btn" id="btn-big" onclick="setMode('big')">𓂀𓂀 Livello 2</button>
  <button class="level-btn" id="btn-decimal" onclick="setMode('decimal')">𓂀𓂀𓂀 Livello 3</button>
  <span class="sep">|</span>
  <button class="action-btn" onclick="newGame()">↺ Nuova</button>
</div>

<div class="pyramid-wrap" id="pyramid"></div>

<div class="result-box" id="resultBox"></div>

<div class="footer-intro">
  Un gioco ispirato al Progetto ArAl: completa i mattoni vuoti sapendo che ogni mattone è sempre la somma dei due sotto di lui. Scegli il livello e premi <em>Nuova</em> per iniziare!
</div>

<div class="btn-row">
  <button class="action-btn" onclick="checkAnswers()">Verifica</button>
  <button class="action-btn" onclick="newGame()">Ricomincia</button>
</div>

<script>
  let values = [], hidden = [], mode = 'small';

  function setMode(m) {
    mode = m;
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + m).classList.add('active');
    newGame();
  }

  function round2(n) { return Math.round(n * 100) / 100; }

  function newGame() {
    document.getElementById('resultBox').style.display = 'none';
    let base = [];
    if (mode === 'small') {
      for (let i = 0; i < 4; i++) base.push(Math.floor(Math.random() * 6));
    } else if (mode === 'big') {
      for (let i = 0; i < 4; i++) base.push(Math.floor(Math.random() * 15));
    } else {
      for (let i = 0; i < 4; i++) base.push(Math.round(Math.random() * 100) / 10);
    }

    values = [base];
    for (let r = 1; r <= 3; r++) {
      let prev = values[r-1], row = [];
      for (let c = 0; c < prev.length - 1; c++) row.push(round2(prev[c] + prev[c+1]));
      values.push(row);
    }

    let all = [];
    for (let r = 0; r < 4; r++)
      for (let c = 0; c < values[r].length; c++) all.push([r,c]);
    all.sort(() => Math.random() - 0.5);
    let toHide = all.slice(0, 5);
    hidden = values.map(row => row.map(() => false));
    toHide.forEach(([r,c]) => hidden[r][c] = true);

    renderPyramid();
  }

  function renderPyramid() {
    const wrap = document.getElementById('pyramid');
    wrap.innerHTML = '';
    for (let r = 3; r >= 0; r--) {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'row';
      for (let c = 0; c < values[r].length; c++) {
        const brick = document.createElement('div');
        brick.className = 'brick' + (hidden[r][c] ? '' : ' given');
        if (hidden[r][c]) {
          const inp = document.createElement('input');
          inp.type = 'number'; inp.step = 'any'; inp.placeholder = '?';
          inp.id = `inp_${r}_${c}`;
          inp.addEventListener('keydown', e => { if(e.key==='Enter') checkAnswers(); });
          brick.appendChild(inp);
        } else {
          brick.textContent = values[r][c];
        }
        rowDiv.appendChild(brick);
      }
      wrap.appendChild(rowDiv);
    }
  }

  function checkAnswers() {
    let correct = 0, total = 0;
    for (let r = 0; r < 4; r++) {
      for (let c = 0; c < values[r].length; c++) {
        if (!hidden[r][c]) continue;
        total++;
        const inp = document.getElementById(`inp_${r}_${c}`);
        const brick = inp.parentElement;
        const uv = parseFloat(inp.value.replace(',','.'));
        brick.classList.remove('correct','wrong');
        if (!isNaN(uv) && Math.abs(uv - values[r][c]) < 0.01) {
          brick.classList.add('correct'); correct++;
        } else {
          brick.classList.add('wrong');
        }
      }
    }
    const box = document.getElementById('resultBox');
    box.style.display = 'block';
    box.textContent = correct === total
      ? `🎉 Perfetto! Tutti i ${total} mattoni giusti!`
      : `Hai trovato ${correct} su ${total} mattoni. Riprova!`;
  }

  newGame();
</script>
</body>
</html>
