/* =========================================================
   Utilità
   ========================================================= */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function prepareQuestions(srcQuestions) {
  const shuffledQ = shuffle(srcQuestions);
  return shuffledQ.map((q) => {
    const idx = q.options.map((_, i) => i);
    const shuffledIdx = shuffle(idx);
    const options = shuffledIdx.map((i) => q.options[i]);
    const answer = shuffledIdx.indexOf(q.answer);
    return Object.assign({}, q, { options: options, answer: answer });
  });
}

/* =========================================================
   Stato app & rendering
   ========================================================= */
const disclaimers = {
  menu: 'Le domande di questo quiz sono tratte dalle prove INVALSI di Matematica per la Scuola Primaria.',
  seconda: 'Le domande di questo quiz sono tratte dalle prove INVALSI di Matematica per la classe seconda della Scuola Primaria, anni 2024-2025 e 2023-2024.',
  quinta: 'Le domande di questo quiz sono tratte dalle prove INVALSI di Matematica per la classe quinta della Scuola Primaria, anni 2024 e 2025.'
};

let activeLevel = null; // 'seconda' | 'quinta' | null (menu)
let questions = [];
let current = 0;
let selected = null;
let score = 0;
let finished = false;

function setDisclaimer() {
  const el = document.getElementById('quiz-disclaimer');
  el.textContent = activeLevel ? disclaimers[activeLevel] : disclaimers.menu;
}

function selectLevel(level) {
  activeLevel = level;
  const src = level === 'seconda' ? secondaQuestions : quintaQuestions;
  questions = prepareQuestions(src);
  current = 0;
  selected = null;
  score = 0;
  finished = false;
  setDisclaimer();
  render();
}

function goToMenu() {
  activeLevel = null;
  questions = [];
  setDisclaimer();
  render();
}

function render() {
  const root = document.getElementById('quiz-root');

  if (!activeLevel) {
    root.innerHTML =
      '<div class="card menu-card">' +
        '<h2 class="menu-title">Quiz INVALSI Matematica</h2>' +
        '<p class="menu-sub">Scegli la classe per iniziare</p>' +
        '<div class="menu-buttons">' +
          '<button class="menu-btn" id="btn-seconda"><span class="menu-icon">🎈</span>Classe Seconda</button>' +
          '<button class="menu-btn alt" id="btn-quinta"><span class="menu-icon">🚀</span>Classe Quinta</button>' +
        '</div>' +
      '</div>';
    document.getElementById('btn-seconda').onclick = function () { selectLevel('seconda'); };
    document.getElementById('btn-quinta').onclick = function () { selectLevel('quinta'); };
    return;
  }

  if (finished) {
    const pct = Math.round((score / questions.length) * 100);
    let msg = 'Continua ad allenarti, ce la farai!';
    if (pct >= 80) msg = 'Ottimo lavoro! 🎉';
    else if (pct >= 50) msg = 'Bel lavoro, continua così! 👍';

    root.innerHTML =
      '<div class="card finished-card">' +
        '<div class="level-tag">Classe ' + (activeLevel === 'seconda' ? 'Seconda' : 'Quinta') + '</div>' +
        '<h2 class="finished-title">Quiz completato!</h2>' +
        '<p class="finished-score">Hai risposto correttamente a <b>' + score + '</b> domande su <b>' + questions.length + '</b></p>' +
        '<p class="finished-pct">' + pct + '%</p>' +
        '<p class="finished-msg">' + msg + '</p>' +
        '<div class="finished-buttons">' +
          '<button class="restart-btn" id="restart-btn">Ricomincia</button>' +
          '<button class="back-btn" id="menu-btn">Cambia classe</button>' +
          '<a class="home-btn" href="https://rdiianni-alt.github.io/matematichenonsinasce/" target="_blank" rel="noopener noreferrer">Torna alla pagina iniziale</a>' +
        '</div>' +
      '</div>';

    document.getElementById('restart-btn').onclick = function () { selectLevel(activeLevel); };
    document.getElementById('menu-btn').onclick = goToMenu;
    return;
  }

  const q = questions[current];
  let optionsHtml = '';
  q.options.forEach(function (opt, i) {
    let cls = 'option-btn';
    if (selected !== null) {
      if (i === q.answer) cls += ' correct';
      else if (i === selected) cls += ' wrong';
      else cls += ' dim';
    }
    optionsHtml += '<button class="' + cls + '" data-idx="' + i + '"' + (selected !== null ? ' disabled' : '') + '><b>' + String.fromCharCode(65 + i) + '.</b> ' + opt + '</button>';
  });

  let feedbackHtml = '';
  if (selected !== null) {
    if (selected === q.answer) {
      feedbackHtml += '<p class="feedback-correct">✓ Corretto!</p>';
    } else {
      feedbackHtml += '<p class="feedback-wrong">✗ Risposta sbagliata. La risposta corretta è la ' + String.fromCharCode(65 + q.answer) + '.</p>';
    }
    feedbackHtml += '<button class="next-btn" id="next-btn">' + (current + 1 < questions.length ? 'Prossima domanda →' : 'Vedi risultati') + '</button>';
  }

  root.innerHTML =
    '<div class="card">' +
      '<div class="top-bar">' +
        '<button class="back-btn" id="back-btn" style="padding:6px 14px;font-size:0.8rem;">← Cambia classe</button>' +
        '<span class="level-tag">Classe ' + (activeLevel === 'seconda' ? 'Seconda' : 'Quinta') + '</span>' +
      '</div>' +
      '<div class="progress-row"><span>Domanda ' + (current + 1) + ' di ' + questions.length + '</span><span>Punteggio: ' + score + '</span></div>' +
      '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + ((current / questions.length) * 100) + '%"></div></div>' +
      '<h2 class="question-text">' + q.text + '</h2>' +
      (q.visual ? visuals[q.visual]() : '') +
      '<div class="options">' + optionsHtml + '</div>' +
      feedbackHtml +
    '</div>';

  document.getElementById('back-btn').onclick = goToMenu;

  if (selected === null) {
    document.querySelectorAll('.option-btn').forEach(function (btn) {
      btn.onclick = function () { selectOption(parseInt(btn.dataset.idx, 10)); };
    });
  } else {
    document.getElementById('next-btn').onclick = next;
  }
}

function selectOption(i) {
  if (selected !== null) return;
  selected = i;
  if (i === questions[current].answer) score++;
  render();
}

function next() {
  if (current + 1 < questions.length) {
    current++;
    selected = null;
  } else {
    finished = true;
  }
  render();
}

setDisclaimer();
render();
</script>
