<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divisione Canadese</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; text-decoration: none; }
  .logo img { width: 60px; height: 60px; object-fit: contain; border-radius: 50%; }
  .logo-text { font-size: 1em; color: #2c5f8a; font-weight: bold; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f7ff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
  h1 { color: #2c5f8a; font-size: 1.6em; margin-bottom: 18px; text-align: center; }

  #setup { background: white; border-radius: 16px; padding: 28px 32px; box-shadow: 0 2px 12px #0001; max-width: 360px; width: 100%; }
  #setup label { display: block; margin-bottom: 6px; color: #444; font-size: 1em; }
  #setup input { width: 100%; padding: 9px 12px; border: 2px solid #b0cfe8; border-radius: 8px; font-size: 1.1em; margin-bottom: 16px; }
  #setup button { width: 100%; padding: 11px; background: #2c7be5; color: white; border: none; border-radius: 10px; font-size: 1.1em; cursor: pointer; }
  #setup button:hover { background: #1a5cbf; }

  #game { display: none; width: 100%; max-width: 700px; flex-direction: column; align-items: center; gap: 12px; }

  /* STICKY INFO BAR */
  #sticky-bar {
    position: sticky; top: 8px; z-index: 10;
    background: #2c7be5; color: white;
    border-radius: 12px; padding: 10px 22px;
    font-size: 1em; text-align: center;
    width: 100%;
    box-shadow: 0 2px 8px #0003;
    display: flex; justify-content: center; gap: 32px;
  }
  .bar-item { display: flex; flex-direction: column; align-items: center; }
  .bar-label { font-size: 0.78em; opacity: 0.85; }
  .bar-value { font-size: 1.3em; font-weight: bold; }

  #dist-area { background: white; border-radius: 14px; padding: 14px 20px; box-shadow: 0 2px 8px #0001; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  #dist-area label { color: #444; font-size: 0.97em; text-align: center; }
  #dist-row { display: flex; gap: 10px; align-items: center; }
  #dist-input { padding: 8px 12px; border: 2px solid #b0cfe8; border-radius: 8px; font-size: 1.1em; width: 90px; text-align: center; }
  #dist-btn { padding: 9px 20px; background: #2c7be5; color: white; border: none; border-radius: 9px; font-size: 1em; cursor: pointer; }
  #dist-btn:hover { background: #1a5cbf; }
  #dist-msg { color: #c0392b; font-size: 0.92em; min-height: 1.2em; text-align: center; }

  #table-wrap { position: relative; width: 560px; height: 560px; }
  #table-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  #balls-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  .ball {
    position: absolute; width: 20px; height: 20px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #74c0fc, #1971c2);
    box-shadow: 1px 2px 4px #0004;
    transition: left 0.65s ease, top 0.65s ease;
    transform: translate(-50%, -50%);
  }
  .child-wrap { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 2px; transform: translate(-50%, -50%); }
  .child-emoji { font-size: 2.6em; line-height: 1; }
  .bubble { background: white; border: 2px solid #2c7be5; border-radius: 12px; padding: 2px 9px; font-size: 0.92em; color: #2c5f8a; font-weight: bold; min-width: 32px; text-align: center; }

  #final-form { display: none; background: white; border-radius: 14px; padding: 20px 24px; box-shadow: 0 2px 8px #0001; width: 100%; }
  #final-form h2 { color: #2c5f8a; font-size: 1.1em; margin-bottom: 14px; text-align: center; }
  .q-row { display: flex; flex-direction: column; margin-bottom: 12px; }
  .q-row label { font-size: 0.95em; color: #444; margin-bottom: 4px; }
  .q-row input { padding: 7px 10px; border: 2px solid #b0cfe8; border-radius: 8px; font-size: 1em; width: 120px; }
  #final-btn { margin-top: 8px; padding: 10px 28px; background: #2c7be5; color: white; border: none; border-radius: 9px; font-size: 1em; cursor: pointer; }
  #final-btn:hover { background: #1a5cbf; }

  #result { display: none; background: white; border-radius: 14px; padding: 22px 26px; box-shadow: 0 2px 8px #0001; width: 100%; }
  #result h2 { color: #2c5f8a; font-size: 1.1em; margin-bottom: 12px; text-align: center; }
  .feedback-row { margin-bottom: 8px; font-size: 0.97em; color: #333; }
  .wrong { color: #c0392b; }
  .formulas { margin-top: 14px; background: #f0f7ff; border-radius: 10px; padding: 14px 18px; }
  .formulas p { font-size: 1.15em; color: #2c5f8a; font-weight: bold; margin-bottom: 6px; text-align: center; }
  .restart-btn { padding: 9px 24px; background: #e74c3c; color: white; border: none; border-radius: 9px; font-size: 0.95em; cursor: pointer; }
  .restart-btn:hover { background: #c0392b; }
  #restart-final { margin-top: 14px; }
</style>
</head>
<body>
<a href="https://matematichenonsinasce.com/" class="logo">
  <img src="https://rdiianni-alt.github.io/matematichenonsinasce/logo.png" alt="logo">
  <div class="logo-text">Matematiche non si nasce</div>
</a>
<h1>🔵 Divisione Canadese</h1>

<div id="setup">
  <label>Quante palline?</label>
  <input type="number" id="inp-balls" min="2" max="200" placeholder="es. 62">
  <label>Quante bambine?</label>
  <input type="number" id="inp-children" min="2" max="8" placeholder="es. 10">
  <button onclick="startGame()">Inizia</button>
</div>

<div id="game">
  <div style="width:100%;display:flex;justify-content:flex-end;">
    <button class="restart-btn" onclick="restart()">↩ Ricomincia</button>
  </div>

  <div id="sticky-bar">
    <div class="bar-item">
      <span class="bar-label">Bambine</span>
      <span class="bar-value" id="lbl-children">0</span>
    </div>
    <div class="bar-item">
      <span class="bar-label">Palline totali</span>
      <span class="bar-value" id="lbl-total">0</span>
    </div>
    <div class="bar-item">
      <span class="bar-label">Da distribuire</span>
      <span class="bar-value" id="lbl-remaining">0</span>
    </div>
  </div>

  <div id="dist-area">
    <label id="dist-label">Quante palline vuoi dare a ciascuna bambina?</label>
    <div id="dist-row">
      <input type="number" id="dist-input" min="1" placeholder="0">
      <button id="dist-btn" onclick="distribute()">Distribuisci</button>
    </div>
    <div id="dist-msg"></div>
  </div>

  <div id="table-wrap">
    <svg id="table-svg">
      <ellipse cx="280" cy="280" rx="225" ry="225" fill="#c8a05a" stroke="#9e7a32" stroke-width="7"/>
      <ellipse cx="280" cy="280" rx="210" ry="210" fill="#ddb96a" stroke="none"/>
    </svg>
    <div id="balls-layer"></div>
  </div>

  <div id="final-form">
    <h2>Rispondi alle domande</h2>
    <div class="q-row"><label>Quante bambine in tutto?</label><input type="number" id="q1" placeholder=" "></div>
    <div class="q-row"><label>Quante palline c'erano da distribuire?</label><input type="number" id="q2" placeholder=" "></div>
    <div class="q-row"><label>Quante palline ha ricevuto ciascuna bambina?</label><input type="number" id="q3" placeholder=" "></div>
    <div class="q-row"><label>Quante palline sono avanzate?</label><input type="number" id="q4" placeholder=" "></div>
    <button id="final-btn" onclick="checkAnswers()">Controlla</button>
  </div>

  <div id="result">
    <h2>Ecco il risultato</h2>
    <div id="feedbacks"></div>
    <div class="formulas">
      <p id="formula1"></p>
      <p id="formula2"></p>
    </div>
    <button id="restart-final" class="restart-btn" onclick="restart()">↩ Ricomincia</button>
  </div>
</div>

<script>
let totalBalls, numChildren, remaining, perChild, childPositions, balls, childCounts;
const CX = 280, CY = 280, R = 160;

function startGame() {
  totalBalls = parseInt(document.getElementById('inp-balls').value);
  numChildren = parseInt(document.getElementById('inp-children').value);
  if (!totalBalls || !numChildren || totalBalls < 2 || numChildren < 2) { alert('Inserisci valori validi.'); return; }
  if (numChildren > totalBalls) { alert('Le palline devono essere più delle bambine.'); return; }
  remaining = totalBalls;
  perChild = 0;
  childCounts = new Array(numChildren).fill(0);
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  document.getElementById('lbl-children').textContent = numChildren;
  document.getElementById('lbl-total').textContent = totalBalls;
  document.getElementById('lbl-remaining').textContent = remaining;
  buildTable();
  placeBalls();
  updateDistArea();
}

function buildTable() {
  const layer = document.getElementById('balls-layer');
  layer.innerHTML = '';
  childPositions = [];
  for (let i = 0; i < numChildren; i++) {
    const angle = (2 * Math.PI * i / numChildren) - Math.PI / 2;
    const x = CX + R * Math.cos(angle);
    const y = CY + R * Math.sin(angle);
    childPositions.push({ x, y });
    const wrap = document.createElement('div');
    wrap.className = 'child-wrap';
    wrap.id = 'child-' + i;
    wrap.style.left = x + 'px';
    wrap.style.top = y + 'px';
    wrap.innerHTML = `<div class="child-emoji">👧🏻</div><div class="bubble" id="bubble-${i}">0</div>`;
    layer.appendChild(wrap);
  }
}

function placeBalls() {
  const layer = document.getElementById('balls-layer');
  balls = [];
  for (let i = 0; i < totalBalls; i++) {
    const b = document.createElement('div');
    b.className = 'ball';
    b.id = 'ball-' + i;
    const angle = Math.random() * 2 * Math.PI;
    const r = Math.random() * Math.random() * 80; // cluster al centro con distribuzione non uniforme
    b.style.left = (CX + r * Math.cos(angle)) + 'px';
    b.style.top = (CY + r * Math.sin(angle)) + 'px';
    layer.appendChild(b);
    balls.push(b);
  }
}

function updateDistArea() {
  const da = document.getElementById('dist-area');
  document.getElementById('lbl-remaining').textContent = remaining;
  if (remaining < numChildren) {
    da.style.display = 'none';
    showFinalForm();
  } else {
    da.style.display = 'flex';
    document.getElementById('dist-label').textContent =
      `Quante palline vuoi dare a ciascuna bambina?`;
    document.getElementById('dist-input').value = '';
    document.getElementById('dist-msg').textContent = '';
  }
}

function distribute() {
  const n = parseInt(document.getElementById('dist-input').value);
  const msg = document.getElementById('dist-msg');
  if (!n || n < 1) { msg.textContent = 'Inserisci un numero valido.'; return; }
  if (n * numChildren > remaining) {
    msg.textContent = `Non ci sono abbastanza palline per darne ${n} a ciascuna.`;
    return;
  }
  msg.textContent = '';
  let ballIdx = 0;
  // find first unassigned
  while (ballIdx < balls.length && balls[ballIdx].dataset.assigned === '1') ballIdx++;

  for (let c = 0; c < numChildren; c++) {
    for (let k = 0; k < n; k++) {
      while (ballIdx < balls.length && balls[ballIdx].dataset.assigned === '1') ballIdx++;
      if (ballIdx >= balls.length) break;
      const b = balls[ballIdx];
      b.dataset.assigned = '1';
      const pos = childPositions[c];
      const jx = (Math.random() - 0.5) * 44;
      const jy = (Math.random() - 0.5) * 30;
      b.style.left = (pos.x + jx) + 'px';
      b.style.top = (pos.y + jy - 44) + 'px';
      ballIdx++;
    }
    childCounts[c] += n;
  }
  perChild += n;
  remaining -= n * numChildren;

  setTimeout(() => {
    for (let c = 0; c < numChildren; c++) {
      document.getElementById('bubble-' + c).textContent = childCounts[c];
    }
    document.getElementById('lbl-remaining').textContent = remaining;
    updateDistArea();
  }, 750);
}

function showFinalForm() {
  // Disponi le palline rimaste in fila centrata nel tavolo
  const unassigned = balls.filter(b => b.dataset.assigned !== '1');
  const n = unassigned.length;
  const spacing = 28;
  const totalW = (n - 1) * spacing;
  const startX = CX - totalW / 2;
  unassigned.forEach((b, i) => {
    b.style.left = (startX + i * spacing) + 'px';
    b.style.top = CY + 'px';
    b.style.width = '22px';
    b.style.height = '22px';
    b.style.zIndex = '10';
  });
  document.getElementById('final-form').style.display = 'block';
}

function checkAnswers() {
  const quotient = perChild;
  const rest = remaining;
  const answers = [
    { label: 'Quante bambine in tutto', correct: numChildren, val: parseInt(document.getElementById('q1').value) },
    { label: 'Quante palline c\'erano da distribuire', correct: totalBalls, val: parseInt(document.getElementById('q2').value) },
    { label: 'Quante palline ha ricevuto ciascuna bambina', correct: quotient, val: parseInt(document.getElementById('q3').value) },
    { label: 'Quante palline sono avanzate', correct: rest, val: parseInt(document.getElementById('q4').value) },
  ];

  let html = '';
  answers.forEach(q => {
    if (q.val === q.correct) {
      html += `<div class="feedback-row">✅ ${q.label}: <strong>${q.correct}</strong></div>`;
    } else {
      html += `<div class="feedback-row wrong">⚠️ Attenzione: "${q.label}" — in realtà era <strong>${q.correct}</strong></div>`;
    }
  });

  document.getElementById('feedbacks').innerHTML = html;
  if (rest === 0) {
    document.getElementById('formula1').textContent = `${totalBalls} = ${quotient} × ${numChildren}`;
    document.getElementById('formula2').textContent = `${totalBalls} ÷ ${numChildren} = ${quotient}`;
  } else {
    document.getElementById('formula1').textContent = `${totalBalls} = ${quotient} × ${numChildren} + ${rest}`;
    document.getElementById('formula2').textContent = `${totalBalls} ÷ ${numChildren} = ${quotient} + ${rest}/${numChildren}`;
  }

  document.getElementById('final-form').style.display = 'none';
  document.getElementById('result').style.display = 'block';
}

function restart() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('final-form').style.display = 'none';
  document.getElementById('game').style.display = 'none';
  document.getElementById('setup').style.display = 'block';
  document.getElementById('inp-balls').value = '';
  document.getElementById('inp-children').value = '';
  ['q1','q2','q3','q4'].forEach(id => document.getElementById(id).value = '');
}
</script>
</body>
</html>
