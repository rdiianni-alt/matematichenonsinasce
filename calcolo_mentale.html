<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcolo Mentale</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0eef8;
    --card: #ffffff;
    --accent: #7F77DD;
    --text: #2e2b4a;
    --muted: #9590b0;
    --correct: #1D9E75;
    --wrong: #D85A30;
    --radius: 14px;
  }

  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }

  /* HEADER LOGO */
  .site-header { text-align: center; margin-bottom: 24px; margin-top: 8px; }
  .site-header a { text-decoration: none; display: inline-flex; flex-direction: column; align-items: center; gap: 8px; }
  .logo img { width: 60px; height: 60px; object-fit: contain; border-radius: 50%; box-shadow: 0 2px 8px rgba(127,119,221,0.2); }
  .site-name { font-size: 15px; font-weight: 600; color: var(--accent); letter-spacing: 0.3px; }

  /* SCREENS */
  .screen { display: none; width: 100%; max-width: 480px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* HOME */
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; text-align: center; color: var(--text); }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; text-align: center; }
  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; align-self: flex-start; }

  .btn-group { display: flex; gap: 8px; width: 100%; margin-bottom: 22px; flex-wrap: wrap; }
  .tog { flex: 1; padding: 12px 8px; border-radius: 10px; border: 1.5px solid #ddd; background: var(--card); color: var(--muted); font-size: 14px; cursor: pointer; transition: all 0.15s; min-width: 80px; }
  .tog.on { border-color: var(--accent); color: var(--accent); background: rgba(127,119,221,0.08); font-weight: 600; }
  .tog:hover:not(.on) { border-color: #bbb; color: var(--text); }

  .start-btn { width: 100%; padding: 16px; border-radius: var(--radius); border: none; background: var(--accent); color: white; font-size: 18px; font-weight: 700; cursor: pointer; transition: background 0.15s; margin-top: 8px; }
  .start-btn:hover { background: #6860c4; }
  .start-btn:disabled { background: #ccc; color: #fff; cursor: default; }

  /* QUIZ */
  .quiz-top { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .badge { background: var(--card); border-radius: 20px; padding: 6px 14px; font-size: 13px; color: var(--muted); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .badge span { color: var(--text); font-weight: 700; }
  .quit-btn { background: none; border: 1.5px solid #ddd; border-radius: 8px; color: var(--muted); padding: 6px 12px; font-size: 13px; cursor: pointer; }
  .quit-btn:hover { border-color: var(--wrong); color: var(--wrong); }

  .question-box { width: 100%; background: var(--card); border-radius: 20px; padding: 40px 24px; text-align: center; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(127,119,221,0.08); }
  .q-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
  .q-text { font-size: 52px; font-weight: 700; letter-spacing: 2px; color: var(--text); }

  .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
  .opt { padding: 20px 12px; border-radius: var(--radius); border: 1.5px solid #ddd; background: var(--card); color: var(--text); font-size: 26px; font-weight: 700; cursor: pointer; transition: all 0.15s; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .opt:hover:not(:disabled) { border-color: var(--accent); background: rgba(127,119,221,0.07); }
  .opt.correct { border-color: var(--correct); background: rgba(29,158,117,0.1); color: #0e6e50; }
  .opt.wrong { border-color: var(--wrong); background: rgba(216,90,48,0.1); color: #993c1d; }
  .opt:disabled { cursor: default; }

  .feedback { margin-top: 16px; font-size: 20px; min-height: 28px; text-align: center; font-weight: 700; }
  .feedback.ok { color: var(--correct); }
  .feedback.ko { color: var(--wrong); }

  .next-btn { margin-top: 16px; width: 100%; padding: 14px; border-radius: var(--radius); border: none; background: var(--accent); color: white; font-size: 16px; font-weight: 700; cursor: pointer; display: none; }
  .next-btn:hover { background: #6860c4; }

  /* RESULT */
  .result-icon { font-size: 72px; margin-bottom: 12px; }
  .result-score { font-size: 52px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
  .result-sub { color: var(--muted); font-size: 16px; margin-bottom: 8px; }
  .result-msg { font-size: 20px; margin-bottom: 28px; text-align: center; color: var(--text); }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; width: 100%; margin-bottom: 28px; }
  .stat { background: var(--card); border-radius: var(--radius); padding: 16px; text-align: center; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
  .stat-val { font-size: 24px; font-weight: 700; }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; }
  .result-btns { display: flex; gap: 10px; width: 100%; }
  .result-btns button { flex: 1; padding: 14px; border-radius: var(--radius); font-size: 15px; font-weight: 700; cursor: pointer; }
  .btn-replay { background: var(--accent); color: white; border: none; }
  .btn-replay:hover { background: #6860c4; }
  .btn-home { background: var(--card); color: var(--text); border: 1.5px solid #ddd; }
  .btn-home:hover { border-color: var(--accent); }
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <a href="https://matematicaconlemani.wordpress.com/" target="_blank" rel="noopener">
    <div class="logo"><img src="https://raw.githubusercontent.com/rdiianni-alt/quiz-matematica-prima/fca31cdfe65286a5abbf269e23429e4ddc479c78/logo.png" alt="Logo Matematiche non si nasce"></div>
    <span class="site-name">Matematiche non si nasce</span>
  </a>
</header>

<!-- HOME -->
<div class="screen active" id="s-home">
  <h1>Calcolo Mentale</h1>
  <p class="subtitle">Allenati con somme e sottrazioni</p>

  <div class="section-title">Livello</div>
  <div class="btn-group" id="lvl-group">
    <button class="tog" data-val="20" onclick="tog('lvl',this)">Entro 20</button>
    <button class="tog" data-val="100" onclick="tog('lvl',this)">Entro 100</button>
    <button class="tog" data-val="1000" onclick="tog('lvl',this)">Entro 1000</button>
  </div>

  <div class="section-title">Operazione</div>
  <div class="btn-group" id="op-group">
    <button class="tog" data-val="+" onclick="tog('op',this)">➕ Somme</button>
    <button class="tog" data-val="-" onclick="tog('op',this)">➖ Sottrazioni</button>
    <button class="tog on" data-val="both" onclick="tog('op',this)">🔀 Entrambe</button>
  </div>

  <button class="start-btn" id="start-btn" onclick="startQuiz()" disabled>Inizia!</button>
</div>

<!-- QUIZ -->
<div class="screen" id="s-quiz">
  <div class="quiz-top">
    <div class="badge">Domanda <span id="q-num">1</span></div>
    <div class="badge">✅ <span id="q-score">0</span> &nbsp;❌ <span id="q-wrong">0</span></div>
    <button class="quit-btn" onclick="endQuiz()">Fine</button>
  </div>
  <div class="question-box">
    <div class="q-label">Calcola</div>
    <div class="q-text" id="q-text">—</div>
  </div>
  <div class="opts" id="opts"></div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="next-btn" onclick="nextQ()">Prossima →</button>
</div>

<!-- RESULT -->
<div class="screen" id="s-result">
  <div class="result-icon" id="r-icon">🏆</div>
  <div class="result-score" id="r-score"></div>
  <div class="result-sub">domande risposte</div>
  <div class="result-msg" id="r-msg"></div>
  <div class="result-grid">
    <div class="stat"><div class="stat-val" style="color:#1D9E75" id="r-correct"></div><div class="stat-lbl">Corrette</div></div>
    <div class="stat"><div class="stat-val" style="color:#D85A30" id="r-wrong2"></div><div class="stat-lbl">Errate</div></div>
    <div class="stat"><div class="stat-val" style="color:#7F77DD" id="r-pct"></div><div class="stat-lbl">Precisione</div></div>
  </div>
  <div class="result-btns">
    <button class="btn-replay" onclick="startQuiz()">🔁 Rigioca</button>
    <button class="btn-home" onclick="goHome()">🏠 Menu</button>
  </div>
</div>

<script>
let cfg = { lvl: null, op: 'both' };
let state = { q: 0, correct: 0, wrong: 0, ans: 0 };

function tog(group, el) {
  if (group === 'lvl') {
    document.querySelectorAll('#lvl-group .tog').forEach(b => b.classList.remove('on'));
    cfg.lvl = parseInt(el.dataset.val);
  } else {
    document.querySelectorAll('#op-group .tog').forEach(b => b.classList.remove('on'));
    cfg.op = el.dataset.val;
  }
  el.classList.add('on');
  document.getElementById('start-btn').disabled = cfg.lvl === null;
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  state = { q: 0, correct: 0, wrong: 0, ans: 0 };
  show('s-quiz');
  nextQ();
}

function makeQ() {
  const max = cfg.lvl;
  let a, b, op, ans;
  const useAdd = cfg.op === '+' ? true : cfg.op === '-' ? false : Math.random() > 0.5;
  if (useAdd) {
    a = Math.floor(Math.random() * (max - 1)) + 1;
    b = Math.floor(Math.random() * (max - a)) + 1;
    ans = a + b;
    op = '+';
  } else {
    ans = Math.floor(Math.random() * (max - 1)) + 1;
    b = Math.floor(Math.random() * ans) + 1;
    a = ans + b;
    op = '−';
  }
  return { text: `${a} ${op} ${b} = ?`, ans };
}

function makeOpts(ans) {
  const opts = new Set([ans]);
  const spread = cfg.lvl <= 20 ? 4 : cfg.lvl <= 100 ? 15 : 80;
  while (opts.size < 4) {
    let w = ans + (Math.floor(Math.random() * spread * 2) - spread);
    if (w > 0 && w !== ans) opts.add(w);
  }
  return [...opts].sort(() => Math.random() - 0.5);
}

function nextQ() {
  state.q++;
  const q = makeQ();
  state.ans = q.ans;
  const opts = makeOpts(q.ans);

  document.getElementById('q-num').textContent = state.q;
  document.getElementById('q-score').textContent = state.correct;
  document.getElementById('q-wrong').textContent = state.wrong;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';

  document.getElementById('opts').innerHTML = opts.map(o =>
    `<button class="opt" onclick="pick(${o}, this)">${o}</button>`
  ).join('');
}

function pick(val, el) {
  document.querySelectorAll('.opt').forEach(b => b.disabled = true);
  const fb = document.getElementById('feedback');
  if (val === state.ans) {
    el.classList.add('correct');
    fb.textContent = ['Esatto! 🎉','Corretto! ⚡','Perfetto! 🌟','Giusto! 🔥'][Math.floor(Math.random()*4)];
    fb.className = 'feedback ok';
    state.correct++;
  } else {
    el.classList.add('wrong');
    document.querySelectorAll('.opt').forEach(b => { if (parseInt(b.textContent) === state.ans) b.classList.add('correct'); });
    fb.textContent = `Ops! La risposta era ${state.ans}`;
    fb.className = 'feedback ko';
    state.wrong++;
  }
  document.getElementById('q-score').textContent = state.correct;
  document.getElementById('q-wrong').textContent = state.wrong;
  document.getElementById('next-btn').style.display = 'block';
}

function endQuiz() {
  const tot = state.correct + state.wrong;
  const pct = tot === 0 ? 0 : Math.round(state.correct / tot * 100);
  const [, icon, msg] = [[90,'🏆','Risultato eccellente!'],[70,'🌟','Ottimo allenamento!'],[50,'💪','Continua così, stai migliorando!'],[0,'😊','Allenati ancora, ce la fai!']].find(([t]) => pct >= t);
  document.getElementById('r-icon').textContent = icon;
  document.getElementById('r-score').textContent = `${state.correct}/${tot}`;
  document.getElementById('r-msg').textContent = msg;
  document.getElementById('r-correct').textContent = state.correct;
  document.getElementById('r-wrong2').textContent = state.wrong;
  document.getElementById('r-pct').textContent = pct + '%';
  show('s-result');
}

function goHome() { show('s-home'); }
</script>
</body>
</html>
