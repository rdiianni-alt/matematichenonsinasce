<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matematiche non si nasce</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#f0f4ff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;}

/* HEADER */
header{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:22px;width:100%;max-width:680px;}
header a{display:flex;flex-direction:column;align-items:center;gap:6px;text-decoration:none;}
.logo img{width:60px;height:60px;object-fit:contain;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.blog-name{font-size:1.15rem;font-weight:800;color:#2c3e7a;letter-spacing:0.5px;text-align:center;}

/* MODE SELECTOR */
.modes{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;justify-content:center;}
.mode-btn{padding:10px 20px;border:2px solid #2c3e7a;border-radius:10px;background:white;color:#2c3e7a;font-weight:700;font-size:0.9rem;cursor:pointer;transition:all 0.2s;text-align:center;}
.mode-btn.active{background:#2c3e7a;color:white;}
.mode-btn:hover{background:#5b7cff;color:white;border-color:#5b7cff;}

/* CARD */
.card{background:white;border-radius:16px;padding:28px 20px;box-shadow:0 4px 20px rgba(0,0,0,0.1);max-width:680px;width:100%;text-align:center;}
.prompt-display{font-size:3rem;font-weight:800;color:#2c3e7a;margin-bottom:22px;line-height:1.1;}
.prompt-display.word-mode{font-size:2.2rem;letter-spacing:2px;}

/* ANSWER AREA */
.answer-flow{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:5px;margin-bottom:18px;padding:10px;}
.box{width:28px;height:40px;border:2px solid #2c3e7a;border-radius:5px;font-size:1rem;font-weight:700;text-align:center;text-transform:uppercase;color:#2c3e7a;background:#f0f4ff;outline:none;caret-color:transparent;transition:border-color 0.2s,background 0.2s;}
.box.digit{font-size:1.4rem;width:36px;text-transform:none;}
.box:focus{border-color:#5b7cff;background:#e8eeff;}
.box.correct{border-color:#27ae60;background:#eafaf1;color:#27ae60;}
.box.wrong{border-color:#e74c3c;background:#fdecea;color:#e74c3c;}

.feedback{font-size:1.1rem;font-weight:700;min-height:26px;margin-bottom:14px;color:#27ae60;}
.feedback.error{color:#e74c3c;}
.btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.btn{background:#2c3e7a;color:white;border:none;padding:10px 26px;border-radius:10px;font-size:0.95rem;font-weight:600;cursor:pointer;transition:background 0.2s;}
.btn:hover{background:#5b7cff;}
.btn.secondary{background:#aaa;}
.btn.secondary:hover{background:#888;}
.score{margin-top:16px;font-size:0.9rem;color:#888;}
.score span{font-weight:700;color:#2c3e7a;}
</style>
</head>
<body>

<header>
  <a href="https://matematicaconlemani.wordpress.com/" target="_blank">
    <div class="logo"><img src="https://raw.githubusercontent.com/rdiianni-alt/quiz-matematica-prima/fca31cdfe65286a5abbf269e23429e4ddc479c78/logo.png" alt="logo"></div>
    <div class="blog-name">Matematiche non si nasce</div>
  </a>
</header>

<div class="modes">
  <button class="mode-btn active" onclick="setMode('n2w')">Cifre → Lettere<br><small>Es. 12 → DODICI</small></button>
  <button class="mode-btn" onclick="setMode('w2n')">Lettere → Cifre<br><small>Es. DODICI → 12</small></button>
</div>

<div class="card">
  <div class="prompt-display" id="promptDisplay">?</div>
  <div class="answer-flow" id="answerFlow"></div>
  <div class="feedback" id="feedback"></div>
  <div class="btns">
    <button class="btn" onclick="checkAnswer()">Controlla</button>
    <button class="btn secondary" onclick="newNumber()">Nuovo numero</button>
  </div>
  <div class="score">Corretti: <span id="correct">0</span> &nbsp;|&nbsp; Tentativi: <span id="attempts">0</span></div>
</div>

<script>
const numeri = {
  1:"UNO",2:"DUE",3:"TRE",4:"QUATTRO",5:"CINQUE",6:"SEI",7:"SETTE",8:"OTTO",9:"NOVE",10:"DIECI",
  11:"UNDICI",12:"DODICI",13:"TREDICI",14:"QUATTORDICI",15:"QUINDICI",16:"SEDICI",17:"DICIASSETTE",
  18:"DICIOTTO",19:"DICIANNOVE",20:"VENTI",21:"VENTUNO",22:"VENTIDUE",23:"VENTITRE",24:"VENTIQUATTRO",
  25:"VENTICINQUE",26:"VENTISEI",27:"VENTISETTE",28:"VENTOTTO",29:"VENTINOVE",30:"TRENTA",
  31:"TRENTUNO",32:"TRENTADUE",33:"TRENTATRE",34:"TRENTAQUATTRO",35:"TRENTACINQUE",36:"TRENTASEI",
  37:"TRENTASETTE",38:"TRENTOTTO",39:"TRENTANOVE",40:"QUARANTA",41:"QUARANTUNO",42:"QUARANTADUE",
  43:"QUARANTATRE",44:"QUARANTAQUATTRO",45:"QUARANTACINQUE",46:"QUARANTASEI",47:"QUARANTASETTE",
  48:"QUARANTOTTO",49:"QUARANTANOVE",50:"CINQUANTA",51:"CINQUANTUNO",52:"CINQUANTADUE",
  53:"CINQUANTATRE",54:"CINQUANTAQUATTRO",55:"CINQUANTACINQUE",56:"CINQUANTASEI",57:"CINQUANTASETTE",
  58:"CINQUANTOTTO",59:"CINQUANTANOVE",60:"SESSANTA",61:"SESSANTUNO",62:"SESSANTADUE",
  63:"SESSANTATRE",64:"SESSANTAQUATTRO",65:"SESSANTACINQUE",66:"SESSANTASEI",67:"SESSANTASETTE",
  68:"SESSANTOTTO",69:"SESSANTANOVE",70:"SETTANTA",71:"SETTANTUNO",72:"SETTANTADUE",
  73:"SETTANTATRE",74:"SETTANTAQUATTRO",75:"SETTANTACINQUE",76:"SETTANTASEI",77:"SETTANTASETTE",
  78:"SETTANTOTTO",79:"SETTANTANOVE",80:"OTTANTA",81:"OTTANTUNO",82:"OTTANTADUE",83:"OTTANTATRE",
  84:"OTTANTAQUATTRO",85:"OTTANTACINQUE",86:"OTTANTASEI",87:"OTTANTASETTE",88:"OTTANTOTTO",
  89:"OTTANTANOVE",90:"NOVANTA",91:"NOVANTUNO",92:"NOVANTADUE",93:"NOVANTATRE",94:"NOVANTAQUATTRO",
  95:"NOVANTACINQUE",96:"NOVANTASEI",97:"NOVANTASETTE",98:"NOVANTOTTO",99:"NOVANTANOVE",100:"CENTO"
};

let mode='n2w'; // 'n2w' = cifre->lettere, 'w2n' = lettere->cifre
let current=1, correctCount=0, attemptCount=0;

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active', (m==='n2w'&&i===0)||(m==='w2n'&&i===1)));
  correctCount=0;attemptCount=0;
  document.getElementById('correct').textContent=0;
  document.getElementById('attempts').textContent=0;
  newNumber();
}

function newNumber(){
  current = Math.floor(Math.random()*100)+1;
  const promptEl = document.getElementById('promptDisplay');
  const flow = document.getElementById('answerFlow');
  flow.innerHTML='';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';

  if(mode==='n2w'){
    promptEl.className='prompt-display';
    promptEl.textContent=current;
    const word=numeri[current];
    const inputs=[];
    for(let i=0;i<word.length;i++){
      const inp=makeBox(i,word,inputs,'letter');
      flow.appendChild(inp);
      inputs.push(inp);
    }
    inputs[0].focus();
  } else {
    promptEl.className='prompt-display word-mode';
    promptEl.textContent=numeri[current];
    // numero da 1 a 100 -> max 3 cifre
    const digits=String(current);
    const inputs=[];
    for(let i=0;i<digits.length;i++){
      const inp=makeBox(i,digits,inputs,'digit');
      flow.appendChild(inp);
      inputs.push(inp);
    }
    inputs[0].focus();
  }
}

function makeBox(i,target,inputs,kind){
  const inp=document.createElement('input');
  inp.type='text';
  inp.maxLength=1;
  inp.className = kind==='digit' ? 'box digit' : 'box';
  if(kind==='digit') inp.inputMode='numeric';
  inp.addEventListener('input',e=>{
    let v=e.target.value;
    if(kind==='digit'){
      v=v.replace(/[^0-9]/g,'');
    } else {
      v=v.toUpperCase().replace(/[^A-Z]/g,'');
    }
    e.target.value=v;
    if(v&&i<inputs.length-1)inputs[i+1].focus();
  });
  inp.addEventListener('keydown',e=>{
    if(e.key==='Backspace'&&!e.target.value&&i>0)inputs[i-1].focus();
    if(e.key==='Enter')checkAnswer();
  });
  return inp;
}

function checkAnswer(){
  attemptCount++;
  document.getElementById('attempts').textContent=attemptCount;
  const fb=document.getElementById('feedback');
  const inputs=document.querySelectorAll('.box');

  let target;
  if(mode==='n2w') target=numeri[current];
  else target=String(current);

  let filled=true;
  inputs.forEach(b=>{if(!b.value)filled=false;});
  if(!filled){
    fb.textContent='Completa tutti gli spazi!';
    fb.className='feedback error';
    attemptCount--;
    document.getElementById('attempts').textContent=attemptCount;
    return;
  }

  let ok=true;
  inputs.forEach((b,i)=>{
    const expected = mode==='n2w' ? target[i] : target[i];
    const got = mode==='n2w' ? b.value.toUpperCase() : b.value;
    if(got===expected) b.classList.add('correct');
    else{ b.classList.add('wrong'); ok=false; }
  });

  if(ok){
    correctCount++;
    document.getElementById('correct').textContent=correctCount;
    fb.textContent='Esatto!';
    fb.className='feedback';
    setTimeout(newNumber,1200);
  } else {
    fb.textContent='Riprova!';
    fb.className='feedback error';
    setTimeout(()=>{
      document.querySelectorAll('.box').forEach(b=>{b.classList.remove('correct','wrong');b.value='';});
      fb.textContent='';
      document.querySelector('.box').focus();
    },1100);
  }
}

newNumber();
</script>
</body>
</html>
